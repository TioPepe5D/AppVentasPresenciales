<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<meta name="description" content="Calculadora de cotizaciones para Joyería Aravena" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Joyería Aravena" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Calculadora · Joyería Aravena</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #05060a;
    --bg-2: #0a0d14;
    --panel: #0f131c;
    --panel-2: #141924;
    --line: #1e2636;
    --line-2: #2a3448;
    --ink: #eaf1fb;
    --ink-dim: #a8b6cc;
    --ink-mute: #6b7a93;
    --gold: #5b9fd6;
    --gold-2: #8ec5ec;
    --gold-deep: #0a2540;
    --silver: #c8d3e0;
    --danger: #e07a7a;
    --accent-rgb: 91, 159, 214;
    --accent-bright-rgb: 142, 197, 236;
    --accent-deep-rgb: 10, 37, 64;
    --surface-overlay-rgb: 10, 9, 7;
    --shadow-color-rgb: 0, 0, 0;
    --highlight-rgb: 255, 255, 255;
    --radius: 10px;
    --shadow: 0 1px 0 rgba(var(--accent-bright-rgb),.06) inset, 0 20px 40px -20px rgba(var(--shadow-color-rgb),.85);
    --serif: 'Montserrat', system-ui, sans-serif;
    --mono: 'Montserrat', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;font-feature-settings:"liga","calt","onum"}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(var(--accent-rgb),.10), transparent 60%),
      radial-gradient(800px 400px at 100% 100%, rgba(var(--accent-deep-rgb),.35), transparent 60%),
      var(--bg);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,select,textarea{font-family:inherit;color:inherit}
  input:focus,select:focus,textarea:focus{outline:none}

  /* Shell */
  .app{max-width:560px;margin:0 auto;padding:14px 12px 140px;position:relative}
  @media (min-width: 520px){ .app{ padding: 22px 18px 120px; } }
  @media (min-width: 720px){ .app{ max-width: 720px; padding: 32px 28px 120px; } }

  /* Header */
  .brand{display:flex;align-items:center;gap:14px;padding:6px 2px 18px;border-bottom:1px solid var(--line)}
  .mark{
    width:44px;height:44px;border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-2), var(--gold) 45%, var(--gold-deep) 100%);
    box-shadow: 0 0 0 1px var(--line-2), inset 0 1px 0 rgba(255,255,255,.25), 0 8px 20px -8px rgba(var(--accent-rgb),.45);
    display:grid;place-items:center;color:var(--ink);font-weight:700;font-size:20px;
    font-family:var(--serif);letter-spacing:.02em
  }
  .brand h1{
    margin:0;font-weight:600;font-size:20px;letter-spacing:.04em;line-height:1;text-transform:uppercase;
  }
  .brand h1 em{font-style:normal;color:var(--gold-2);font-weight:300;letter-spacing:.06em}
  .brand .sub{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.22em;color:var(--ink-mute);text-transform:uppercase;margin-top:6px}

  /* Tabs */
  .tabs{display:flex;gap:2px;margin:14px 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;position:sticky;top:6px;z-index:10;backdrop-filter:blur(8px);overflow:hidden}
  .tab{
    flex:1 1 0;min-width:0;padding:10px 4px;border-radius:999px;font-size:11px;letter-spacing:.02em;
    color:var(--ink-dim);transition:all .2s ease;
    font-family:var(--serif);font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:4px;
    min-height:44px;white-space:nowrap;overflow:hidden;
  }
  .tab svg{flex-shrink:0}
  @media (min-width: 400px){ .tab{ font-size:12px; gap:5px; padding:10px 6px; } }
  @media (min-width: 520px){ .tab{ font-size:14px; gap:6px; padding:10px 8px; } }
  .tab[aria-selected="true"]{
    background:linear-gradient(180deg, rgba(var(--accent-bright-rgb),.15), rgba(var(--accent-rgb),.06));
    color:var(--gold-2);
    box-shadow: inset 0 0 0 1px rgba(var(--accent-bright-rgb),.22);
  }
  .tab .dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6}

  /* Cards */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .card + .card{margin-top:14px}
  .card-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  @media (min-width: 520px){ .card-head{ padding:14px 16px; } }
  .card-head h2{
    margin:0;font-weight:600;font-size:14px;letter-spacing:.08em;text-transform:uppercase;
  }
  .card-head h2 em{font-style:normal;color:var(--gold-2);font-weight:300}
  .eyebrow{font-family:var(--mono);font-weight:500;font-size:9.5px;letter-spacing:.22em;color:var(--ink-mute);text-transform:uppercase}

  /* Decorative flourish */
  .flourish{display:flex;align-items:center;gap:10px;color:var(--gold-deep);margin:0 0 4px}
  .flourish::before,.flourish::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent)}
  .flourish span{font-family:var(--mono);font-weight:500;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-mute)}
  .diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 0 2px rgba(var(--accent-rgb),.18)}

  /* Lines */
  .lines{padding:6px 8px 10px}
  @media (min-width: 520px){ .lines{ padding:6px 10px 10px; } }
  .line{
    display:grid;
    grid-template-columns: 1fr 96px 40px;
    gap:6px;align-items:stretch;
    padding:10px 4px;
    border-bottom:1px dashed var(--line);
    position:relative;
  }
  @media (min-width: 520px){ .line{ grid-template-columns: 1fr 110px 40px; gap:8px; padding:10px 6px; } }
  .line:last-child{border-bottom:0}
  .line-idx{
    position:absolute;left:-6px;top:12px;
    font-family:var(--mono);font-size:9px;color:var(--ink-mute);letter-spacing:.1em;
    writing-mode:vertical-rl;transform:rotate(180deg);
  }
  .field{
    display:flex;flex-direction:column;gap:4px;
  }
  .field label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase;padding-left:2px}
  .control{
    background:rgba(var(--surface-overlay-rgb),.5);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    font-size:16px;
    color:var(--ink);
    min-height:48px;
    display:flex;align-items:center;
    transition: border-color .15s;
  }
  .control:focus-within, .control:hover{border-color:var(--line-2)}
  .control select, .control input{
    width:100%;background:none;border:0;font-size:16px;font-family:var(--serif);
  }
  .control input[type="number"]{font-family:var(--mono);font-weight:500;font-size:16px;letter-spacing:.02em}
  .control select{appearance:none;padding-right:18px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23a8b6cc' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 2px center}
  .control select option{background:var(--bg-2);color:var(--ink)}
  .unit{color:var(--ink-mute);font-family:var(--mono);font-weight:500;font-size:12px;margin-left:6px}

  .line .remove{
    align-self:stretch;
    display:grid;place-items:center;
    color:var(--ink-mute);
    border:1px solid var(--line);
    border-radius:8px;
    background: rgba(var(--surface-overlay-rgb),.3);
    margin-top:15px;
    min-width:40px;
    transition: all .15s;
  }
  .line .remove:hover{color:var(--danger);border-color:rgba(224,122,122,.4)}
  .legacy-price-table{display:none}
  .custom-price-field .control input[type="number"]{font-size:16px}
  .line-insumo .insumo-qty-field,
  .line-insumo .insumo-name-old,
  .line-insumo .insumo-note,
  .line-insumo .insumo-price-tag-clean + .insumo-price-tag,
  .line-insumo .insumo-price-tag-clean + .insumo-price-tag + .price-tag{display:none}
  .line-insumo{grid-template-columns:minmax(0,1fr) minmax(0,1fr) 40px;align-items:end}
  .line-insumo .line-category-field{grid-column:1 / -1;grid-row:1}
  .line-insumo .insumo-name-primary{grid-column:1 / -1;grid-row:2}
  .line-insumo .insumo-cost-field{grid-column:1;grid-row:3}
  .line-insumo .remove{grid-column:3;grid-row:3;margin-top:15px}
  .line-insumo .insumo-value-field{grid-column:2;grid-row:3}
  .line-insumo .insumo-name-primary .unit{display:none}
  .line-insumo .line-meta{grid-column:1 / -1;grid-row:4;margin-top:8px}
  @media (max-width: 480px){
    .line-insumo{grid-template-columns:1fr 40px}
    .line-insumo .line-category-field,
    .line-insumo .insumo-name-primary{grid-column:1 / -1;grid-row:auto}
    .line-insumo .insumo-cost-field{grid-column:1;grid-row:auto}
    .line-insumo .insumo-value-field{grid-column:1;grid-row:auto}
    .line-insumo .remove{grid-column:2;grid-row:4}
    .line-insumo .line-meta{grid-row:auto}
  }

  .line-meta{
    grid-column: 1 / -1;
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-mute);letter-spacing:.04em;
    padding: 2px 2px 0;
  }
  .line-meta .price-tag{color:var(--ink-dim)}
  .line-meta .subtotal{color:var(--gold-2);font-size:13px;font-weight:600;letter-spacing:.02em}
  .insumo-note{
    border:1px solid var(--line);
    border-radius:8px;
    background:rgba(var(--surface-overlay-rgb),.28);
    color:var(--ink-dim);
    font-family:var(--mono);
    font-size:10px;
    font-weight:500;
    letter-spacing:.04em;
    line-height:1.45;
    padding:8px 10px;
  }
  .insumo-note-warning{
    border-color:rgba(199,122,90,.55);
    background:rgba(199,122,90,.12);
    color:#e9b79f;
  }

  .add-line{
    display:flex;align-items:center;justify-content:center;gap:8px;
    width:100%;padding:16px;margin-top:8px;min-height:52px;
    border:1px dashed var(--line-2);border-radius:10px;
    color:var(--ink-dim);font-size:15px;font-weight:500;letter-spacing:.02em;
    background: rgba(var(--accent-rgb),.02);
    transition: all .2s;
  }
  .add-line:hover{border-color:var(--gold);color:var(--gold-2);background:rgba(var(--accent-rgb),.06)}
  .add-line .plus{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:grid;place-items:center;font-size:14px;line-height:1}

  /* Summary */
  .summary{padding:14px 14px 18px}
  @media (min-width: 520px){ .summary{ padding:18px 18px 20px; } }
  .tier{
    display:flex;align-items:center;gap:12px;padding:12px 14px;
    background: linear-gradient(180deg, rgba(var(--accent-rgb),.10), rgba(var(--accent-deep-rgb),.25));
    border:1px solid rgba(var(--accent-bright-rgb),.24);
    border-radius:10px;margin-bottom:14px;
  }
  .tier-badge{
    width:44px;height:44px;border-radius:6px;
    background: linear-gradient(160deg, var(--gold-2), var(--gold) 60%, var(--gold-deep));
    color:var(--ink);display:grid;place-items:center;
    font-weight:700;font-size:18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.25);
    position:relative;flex-shrink:0;
  }
  .tier-badge::after{content:"";position:absolute;inset:3px;border:1px solid rgba(var(--highlight-rgb),.2);border-radius:4px}
  .summary > .tier{display:none}
  .tier-body{flex:1;min-width:0}
  .tier-body .eyebrow{margin-bottom:2px}
  .tier-body .why{font-size:13px;color:var(--ink-dim);line-height:1.4}
  .tier-body .why strong{color:var(--ink);font-weight:600}

  .totals{display:grid;gap:10px}
  .totals > .row{display:none !important}
  .totals .row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
  .totals .row .k{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.18em;color:var(--ink-mute);text-transform:uppercase}
  .totals .row .v{font-family:var(--mono);font-weight:500;font-size:14px;color:var(--ink-dim);letter-spacing:.02em}
  .summary-block{display:grid;gap:6px;padding:10px 0;border-top:1px solid var(--line)}
  .summary-block:first-of-type{border-top:0;padding-top:0}
  .summary-block h3{margin:0 0 2px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--ink);text-transform:uppercase}
  .summary-block .row.muted .k,
  .summary-block .row.muted .v{color:var(--ink-mute)}
  .sale-detail .row .k{color:var(--ink-dim)}

  /* Utilidad — secundaria, discreta */
  .totals .row.grand{
    padding:10px 0 4px;border-top:1px solid var(--line);margin-top:6px;
    display:flex;flex-direction:row;align-items:baseline;justify-content:space-between;gap:0;
  }
  .totals .row.grand .k{color:var(--ink-mute);font-family:var(--mono);font-weight:600;font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .totals .row.grand .v{
    color:var(--ink-dim);font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:-.01em;
  }
  .totals .row.grand .v .currency{font-family:var(--mono);font-weight:500;font-size:9px;color:var(--ink-mute);letter-spacing:.15em;margin-right:4px;vertical-align:middle}

  /* Total a cobrar — principal, destacado */
  .totals .row.cobrar{
    padding:16px 0 4px;border-top:2px solid var(--gold-2);margin-top:8px;
    flex-direction:column;align-items:flex-start;gap:4px;
  }
  .totals .row.cobrar .k{color:var(--gold-2);font-family:var(--mono);font-weight:700;font-size:10px;letter-spacing:.22em;text-transform:uppercase}
  .totals .row.cobrar .v{color:var(--gold-2);font-family:var(--serif);font-size:44px;font-weight:700;letter-spacing:-.02em;line-height:1}
  .totals .row.cobrar .v .currency{font-family:var(--mono);font-weight:500;font-size:11px;color:var(--ink-mute);letter-spacing:.15em;margin-right:6px;vertical-align:middle}
  @media (min-width: 520px){
    .totals .row.cobrar{flex-direction:row;align-items:baseline;gap:0}
    .totals .row.cobrar .v{font-size:36px}
  }

  /* Actions */
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
  .btn{
    width:100%;min-width:0;
    padding:14px 18px;border-radius:999px;
    font-size:15px;font-weight:600;letter-spacing:.02em;
    border:1px solid var(--line-2);background:var(--panel);
    color:var(--ink);transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    min-height:52px;
  }
  .btn:hover{border-color:var(--gold);color:var(--gold-2)}
  .btn.primary{
    background:linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color:var(--btn-fg, #ffffff);border-color:transparent;font-weight:600;letter-spacing:.04em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 6px 16px -6px rgba(var(--accent-rgb),.55);
  }
  .btn.primary:hover{filter:brightness(1.12);color:#fff}
  .btn.accent{
    background:linear-gradient(180deg, var(--gold-2) 0%, var(--gold) 70%, var(--gold-deep));
    color:var(--btn-fg, var(--gold-deep));border-color:transparent;font-weight:700;letter-spacing:.04em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 8px 20px -6px rgba(var(--accent-bright-rgb),.5);
  }
  .btn.accent:hover{filter:brightness(1.08);color:var(--btn-fg, var(--gold-deep))}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.3)}

  /* Empty state */
  .empty{
    text-align:center;padding:40px 20px;color:var(--ink-mute);
  }
  .empty .diamond{margin:0 auto 12px}
  .empty p{font-size:14px;margin:6px 0;color:var(--ink-dim)}
  .empty .hint{font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-top:10px}

  /* History */
  .history-search{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:10px 14px;margin-bottom:12px;
  }
  .history-search input{
    flex:1;background:none;border:0;font-size:15px;color:var(--ink);font-family:var(--serif);
  }
  .history-search input::placeholder{color:var(--ink-mute)}
  .history-search svg{flex-shrink:0;color:var(--ink-mute)}

  .quote{
    padding:14px 14px;border-bottom:1px solid var(--line);
  }
  .quote:last-child{border-bottom:0}
  .quote-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
  .quote-name{font-size:15px;font-weight:600;letter-spacing:.01em}
  .quote-name em{color:var(--ink-mute);font-weight:400;font-size:13px;font-style:normal}
  .quote-date{font-family:var(--mono);font-weight:500;font-size:10px;color:var(--ink-mute);letter-spacing:.1em;white-space:nowrap}
  .quote-lines{font-size:13px;color:var(--ink-dim);margin:6px 0 10px;line-height:1.5}
  .quote-lines .sep{color:var(--line-2);margin:0 6px}
  .quote-staff{font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:.04em;margin:4px 0 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .quote-staff b{color:var(--ink-dim);font-weight:600}
  .quote-staff .sep{color:var(--line-2)}

  /* Reports */
  .report-summary{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:8px;padding:8px 12px 14px}
  @media (max-width: 480px){ .report-summary{grid-template-columns:1fr 1fr;gap:6px} }
  .rs-card{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .rs-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--ink-mute);text-transform:uppercase}
  .rs-value{font-size:18px;font-weight:600;color:var(--gold-2);margin-top:4px;letter-spacing:.02em}
  .rs-sub{font-family:var(--mono);font-size:10px;color:var(--ink-mute);margin-top:2px}
  .report-people{padding:4px 12px 12px;display:flex;flex-direction:column;gap:6px}
  .rp-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 12px;background:var(--bg-2);border:1px solid var(--line);border-radius:10px}
  .rp-name{font-weight:600;font-size:14px;color:var(--ink)}
  .rp-tag{font-family:var(--mono);font-size:10px;color:var(--ink-mute);font-weight:400;letter-spacing:.1em}
  .rp-breakdown{display:flex;flex-wrap:wrap;gap:10px;font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:.02em}
  .rp-breakdown b{color:var(--ink-dim);font-weight:600}
  .rp-total{font-weight:700;font-size:15px;color:var(--gold-2);white-space:nowrap}
  @media (max-width: 480px){ .rp-row{grid-template-columns:1fr;gap:4px} .rp-total{text-align:right} }
  .report-list{padding:4px 12px 12px;display:flex;flex-direction:column;gap:6px}
  .report-item{background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .ri-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .ri-client{font-weight:600;font-size:14px;color:var(--ink)}
  .ri-total{font-weight:700;font-size:14px;color:var(--gold-2);white-space:nowrap}
  .ri-sub{font-family:var(--mono);font-size:11px;color:var(--ink-mute);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .ri-sub b{color:var(--ink-dim);font-weight:600}

const hexToRgb = (hex) => {
  const m = /^#?([a-f0-9]{6}|[a-f0-9]{3})$/i.exec((hex||"").trim());
  if (!m) return null;
  let h = m[1];
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];

const lighten = (hex, t) => { const c = hexToRgb(hex); return c ? toHex(mix(c, [255,255,255], t)) : hex; };
const darken = (hex, t) => { const c = hexToRgb(hex); return c ? toHex(mix(c, [0,0,0], t)) : hex; };
const luminance = (hex) => { const c = hexToRgb(hex); if (!c) return 0; return (0.299*c[0]+0.587*c[1]+0.114*c[2])/255; };

const buildCustomTheme = (c) => {
  const bg = c.bg || DEFAULT_CUSTOM.bg;
  const panel = c.panel || DEFAULT_CUSTOM.panel;
  const ink = c.ink || DEFAULT_CUSTOM.ink;
  const accent = c.accent || DEFAULT_CUSTOM.accent;
  const isLight = luminance(bg) > 0.5;
  const accentRgb = hexToRgb(accent) || [155,107,255];
  const accentBright = lighten(accent, 0.25);
  const accentDeep = darken(accent, 0.55);
  const inkRgb = hexToRgb(ink) || [238,238,238];
  return {
    "--bg": bg,
    "--bg-2": isLight ? darken(bg, 0.04) : lighten(bg, 0.04),
    "--panel": panel,
    "--panel-2": isLight ? darken(panel, 0.03) : lighten(panel, 0.04),
    "--line": isLight ? darken(panel, 0.10) : lighten(panel, 0.10),
    "--line-2": isLight ? darken(panel, 0.18) : lighten(panel, 0.18),
    "--ink": ink,
    "--ink-dim": isLight ? lighten(ink, 0.30) : darken(ink, 0.30),
    "--ink-mute": isLight ? lighten(ink, 0.55) : darken(ink, 0.50),
    "--gold": accent,
    "--gold-2": accentBright,
    "--gold-deep": accentDeep,
    "--accent-rgb": rgbStr(accentRgb),
    "--accent-bright-rgb": rgbStr(hexToRgb(accentBright)),
    "--accent-deep-rgb": rgbStr(hexToRgb(accentDeep)),
    "--surface-overlay-rgb": isLight ? "245, 240, 230" : "10, 9, 7",
    "--shadow-color-rgb": isLight ? "60, 50, 30" : "0, 0, 0",
    "--highlight-rgb": isLight ? rgbStr(inkRgb) : "255, 255, 255",
    "--btn-fg": luminance(accent) > 0.55 ? "#1a1a1a" : "#ffffff",
  };
};

const applyTheme = (themeId, customConfig) => {
  let vars;
  let metaColor;
  if (themeId === 'custom') {
    vars = buildCustomTheme(customConfig || DEFAULT_CUSTOM);
    metaColor = vars["--bg"];
  } else {
    const t = THEMES[themeId] || THEMES.dark;
    vars = t.vars;
    metaColor = t.metaColor;
  }
  const root = document.documentElement;
  Object.entries(vars).forEach(([k, v]) => root.style.setProperty(k, v));
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', metaColor);
};

// ---------- Utils ----------
const fmtCLP = (n) => {
  if (!isFinite(n)) n = 0;
  return new Intl.NumberFormat('es-CL', { maximumFractionDigits: 0 }).format(Math.round(n));
};
const fmtDate = (t) => {
  const d = new Date(t);
  return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' }).replace('.','') +
         ' · ' + d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
};
const uid = () => Math.random().toString(36).slice(2, 9);

const CATEGORY_EMOJI = {
  collar_pulsera_mujer_925: "🇨🇱",
  collar_pulsera_hombre_925: "🇨🇱",
  aros_colgantes_925: "🇨🇱",
  anillos_925: "🇨🇱",
  collar_pulsera_micro: "🇨🇱",
  italiana_925: "🇮🇹",
  gf_18k: "☀️"
};
const emojiForCategory = (key, cat) => {
  if (CATEGORY_EMOJI[key]) return CATEGORY_EMOJI[key];
  const mat = (cat?.material || "").toUpperCase();
  if (mat.includes("GF")) return "☀️";
  if (mat === "925") return "🇮🇹";
  return "🇨🇱";
};

const MESSAGE_GROUPS = [
  { key: "collares", label: "Cadena", emoji: "🇨🇱",
    categories: ["collar_pulsera_mujer_925", "collar_pulsera_hombre_925"] },
  { key: "micro", label: "Micro", emoji: "🇨🇱",
    categories: ["collar_pulsera_micro", "aros_colgantes_925", "anillos_925"] },
  { key: "italiana", label: "Italiana 925", emoji: "🇮🇹",
    categories: ["italiana_925"] },
  { key: "gf", label: "GF 18K", emoji: "☀️",
    categories: ["gf_18k"] }
];
const fmtGrams = (g) => {
  const r = Math.round(g * 10) / 10;
  return Number.isInteger(r) ? String(r) : r.toFixed(1);
};
// Mapa de tipo de lote → clave de grupo de mensaje
const LOTE_GROUP_MAP = {
  cadena:   'collares',
  micro:    'micro',
  italiana: 'italiana',
  gf18k:    'gf',
};
const buildMessagePiezas = (validLines, prices) => {
  const sums = new Map();
  const order = [];
  const ungrouped = [];
  const insumos = [];

  const addToGroup = (groupKey, grams) => {
    const group = MESSAGE_GROUPS.find(g => g.key === groupKey);
    if (!group) return;
    if (!sums.has(group.key)) { sums.set(group.key, 0); order.push(group); }
    sums.set(group.key, sums.get(group.key) + grams);
  };

  for (const l of validLines) {
    if (l.category === INSUMO_KEY) { insumos.push(l); continue; }
    if (l.category === LOTE_KEY) {
      // Los gramos de cada tipo del lote se suman al grupo correspondiente
      const gramsMap = l.loteGramsMap || {};
      for (const [typeKey, groupKey] of Object.entries(LOTE_GROUP_MAP)) {
        const g = Number(gramsMap[typeKey]) || 0;
        if (g > 0) addToGroup(groupKey, g);
      }
      continue;
    }
    const grams = Number(l.grams) || 0;
    const group = MESSAGE_GROUPS.find(g => g.categories.includes(l.category));
    if (group) {
      if (!sums.has(group.key)) { sums.set(group.key, 0); order.push(group); }
      sums.set(group.key, sums.get(group.key) + grams);
    } else {
      const cat = prices[l.category];
      ungrouped.push({
        grams,
        label: cat?.name || l.category,
        emoji: emojiForCategory(l.category, cat)
      });
    }
  }
  const lines = order.map(g => `${fmtGrams(sums.get(g.key))} | ${g.emoji} ${g.label}`);
  for (const u of ungrouped) lines.push(`${fmtGrams(u.grams)} | ${u.emoji} ${u.label}`);
  for (const ins of insumos) {
    const cost  = Number(ins.insumoCost)  || Number(ins.insumoPrice) || 0;
    const qty   = 1;
    lines.push(`💎 ${qty} ${ins.insumoName || 'Insumo'}: $${fmtCLP(cost * qty)}`);
  }
  return lines.join('\n');
};

// Index map: 0=T-0 (≤$30k), 1=T-I (>$30k), 2=T-II (>$100k), 3=T-III (>499g), 4=T-IV (>999g)
// El total final CON el descuento del tramo debe superar el umbral.
// Si al aplicar T-II el total cae bajo $100k, se baja a T-I, etc.
function computeTotals(lines, prices){
  const regular = lines.filter(l => l.category !== INSUMO_KEY && l.category !== LOTE_KEY);
  const regularWeight = regular.reduce((s,l) => s + (Number(l.grams)||0), 0);
  // Sumar gramos de lotes (loteGramsMap para líneas en calculadora, l.grams para líneas guardadas)
  const loteWeight = lines.filter(l => l.category === LOTE_KEY).reduce((s,l) => {
    if (l.loteGramsMap && Object.keys(l.loteGramsMap).length > 0) {
      return s + Object.values(l.loteGramsMap).reduce((sum,v) => sum + (Number(v)||0), 0);
    }
    return s + (Number(l.grams)||0);
  }, 0);
  const totalWeight = regularWeight + loteWeight;

  const calcRegularTotal = (tierIdx) => regular.reduce((s,l) => {
    const cat = prices[l.category];
    if (!cat) return s;
    const unitPrice = Number(l.customPrice) || 0;
    return s + unitPrice * (Number(l.grams)||0);
  }, 0);

  let tier;
  // Peso tiene prioridad
  if (totalWeight > 999) tier = 4;
  else if (totalWeight > 499) tier = 3;
  else {
    // Tramos por precio: el total AL precio del tramo debe superar el umbral
    const totalAtII = calcRegularTotal(2);
    const totalAtI  = calcRegularTotal(1);

    if (totalAtII > 100000) tier = 2;
    else tier = 1;
  }

  const regularTotal = calcRegularTotal(tier);
  const insumoTotal = lines.filter(l => l.category === INSUMO_KEY).reduce((s,l) => {
    const cost  = Number(l.insumoCost) || 0;
    // Si insumoValor fue ingresado (incluso como 0 = regalo), respetarlo; si no, usar cost
    const valor = (l.insumoValor !== '' && l.insumoValor !== undefined && l.insumoValor !== null)
      ? Number(l.insumoValor)
      : cost;
    const qty   = 1;
    return s + valor * qty;
  }, 0);
  const loteTotal = lines.filter(l => l.category === LOTE_KEY).reduce((s,l) => s + (Number(l.lotePrice)||0), 0);
  const total = regularTotal + insumoTotal + loteTotal;

  let reason;
  if (totalWeight > 999) reason = `Peso total ${fmtCLP(totalWeight)}g supera 999g`;
  else if (totalWeight > 499) reason = `Peso total ${fmtCLP(totalWeight)}g supera 499g`;
  else if (tier === 2) reason = `Venta supera $100.000`;
  else reason = `Precio T-I`;

  return { tier, total, totalWeight, reason };
}

// ---------- Lógica de negocio ----------
// Kilero se activa automáticamente en tramos basados en peso (T-III desde 500g).
const isKileroTier = (tier) => tier >= 3;
const effectiveCost = (cat, tier) => {
  if (!cat) return 0;
  const n = isKileroTier(tier) ? Number(cat.costKilero) : Number(cat.cost);
  return isFinite(n) ? n : (Number(cat.cost) || 0);
};

const quoteCostAndProfit = (quote, prices) => {
  const BASE_COST = 1000; // Costo base fijo por bolsas/insumos
  let tCost = BASE_COST;
  const LOTE_CAT_MAP = {
    cadena:   'collar_pulsera_mujer_925',
    micro:    'collar_pulsera_micro',
    italiana: 'italiana_925',
    gf18k:    'gf_18k',
  };
  for (const l of (quote.lines || [])) {
    if (l.category === INSUMO_KEY) {
      // Usar insumoCost (costo real), no insumoPrice (valor cobrado al cliente)
      const cost = Number(l.insumoCost) || 0;
      const qty  = Number(l.insumoQty)  || 1;
      tCost += cost * qty;
      continue;
    }
    if (l.category === LOTE_KEY) {
      const gramsMap = l.loteGramsMap || {};
      for (const [typeKey, catKey] of Object.entries(LOTE_CAT_MAP)) {
        const g = Number(gramsMap[typeKey]) || 0;
        if (g > 0) {
          const snap = quote.costsSnap && quote.costsSnap[catKey];
          const c = (typeof snap === 'number') ? snap : (Number(prices?.[catKey]?.cost) || 0);
          tCost += c * g;
        }
      }
      continue;
    }
    const g = Number(l.grams) || 0;
    const snap = quote.costsSnap && quote.costsSnap[l.category];
    const c = (typeof snap === 'number') ? snap : (Number(prices?.[l.category]?.cost) || 0);
    tCost += c * g;
  }
  const profit = (Number(quote.total) || 0) - tCost;
  return { totalCost: tCost, profit };
};

const computeCommissions = (quote, prices) => {
  const { profit } = quoteCostAndProfit(quote, prices);
  const base = Math.max(0, profit);
  const sched = (quote.scheduler || "").trim();
  const att   = (quote.attendant || "").trim();
  const splits = {};
  const add = (name, amt) => {
    if (!name) return;
    splits[name] = (splits[name] || 0) + amt;
  };
  add(sched || EMPRESA, base * PCT_SCHEDULER);
  add(att   || EMPRESA, base * PCT_ATTENDANT);
  add(EMPRESA, base * PCT_EMPRESA);
  return splits;
};

const monthKey = (ts) => {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
};
const monthLabel = (key) => {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m-1, 1);
  return d.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' });
};

// ---------- Icons ----------
const Icon = ({ name, size=16 }) => {
  const common = { width:size, height:size, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:1.5, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name){
    case 'calc': return <svg {...common}><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8M8 11h3M13 11h3M8 15h3M13 15h3M8 19h3M13 19h3"/></svg>;
    case 'clock': return <svg {...common}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'list': return <svg {...common}><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>;
    case 'trash': return <svg {...common}><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13a2 2 0 002 2h6a2 2 0 002-2l1-13M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"/></svg>;
    case 'copy': return <svg {...common}><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V5a1 1 0 00-1-1H5a1 1 0 00-1 1v10a1 1 0 001 1h3"/></svg>;
    case 'share': return <svg {...common}><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>;
    case 'search': return <svg {...common}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
    case 'x': return <svg {...common}><path d="M6 6l12 12M18 6L6 18"/></svg>;
    case 'sliders': return <svg {...common}><path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h14M20 18h0"/><circle cx="16" cy="6" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="18" cy="18" r="2"/></svg>;
    case 'check': return <svg {...common}><path d="M20 6L9 17l-5-5"/></svg>;
    case 'circle': return <svg {...common}><circle cx="12" cy="12" r="8"/></svg>;
    default: return null;
  }
};

// ---------- Login Firebase ----------
function LoginScreen({ onAuth }){
  const [email, setEmail] = useState("");
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!email.trim() || !pwd) { setErr("Completa todos los campos"); return; }
    setLoading(true); setErr("");
    try {
      const cred = await window.__FB.signIn(email.trim().toLowerCase(), pwd);
      const profile = await window.__FB.getUserProfile(cred.user.uid);
      if (!profile) {
        await window.__FB.saveUserProfile(cred.user.uid, {
          uid: cred.user.uid, email: cred.user.email,
          name: email.split("@")[0],
          role: cred.user.email === window.__FB.ADMIN_EMAIL ? "admin" : "user",
          createdAt: Date.now()
        });
      }
      onAuth(cred.user);
    } catch(e) {
      const msgs = {
        "auth/invalid-credential":  "Email o contraseña incorrectos",
        "auth/user-not-found":      "Usuario no encontrado",
        "auth/wrong-password":      "Contraseña incorrecta",
        "auth/invalid-email":       "Email inválido",
        "auth/too-many-requests":   "Demasiados intentos. Espera unos minutos.",
      };
      setErr(msgs[e.code] || "Error al iniciar sesión");
    } finally { setLoading(false); }
  };

  return (
    <div className="app">
      <header className="brand">
        <div className="mark" aria-hidden>◆</div>
        <div>
          <h1>Joyería <em>Aravena</em></h1>
          <div className="sub">Ventas Presenciales</div>
        </div>
      </header>
      <div className="card" style={{marginTop:20}}>
        <div className="card-head">
          <h2>Acceso <em>restringido</em></h2>
          <span className="eyebrow">Ingresa tus credenciales</span>
        </div>
        <form onSubmit={submit} className="client" style={{padding:"18px 16px 20px"}}>
          <div className="control-labeled">
            <label>Email</label>
            <div className="control">
              <input type="email" autoFocus value={email}
                onChange={e => { setEmail(e.target.value); setErr(""); }}
                placeholder="tu@email.com" autoComplete="email" />
            </div>
          </div>
          <div className="control-labeled">
            <label>Contraseña</label>
            <div className="control" style={err ? {borderColor:"var(--danger)"} : null}>
              <input type="password" value={pwd}
                onChange={e => { setPwd(e.target.value); setErr(""); }}
                placeholder="••••••••" autoComplete="current-password" />
            </div>
            {err && <span style={{color:"var(--danger)",fontSize:12,marginTop:4,fontFamily:"var(--mono)"}}>{err}</span>}
          </div>
          <div className="actions" style={{marginTop:16}}>
            <button type="submit" className="btn accent" style={{flex:1}} disabled={loading}>
              {loading ? "Entrando…" : "Entrar"}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ---------- Admin Panel ----------
function AdminPanel({ currentUser, onClose }){
  const [users, setUsers]         = useState([]);
  const [allQuotes, setAllQuotes] = useState([]);
  const [newEmail, setNewEmail]   = useState("");
  const [newPwd, setNewPwd]       = useState("");
  const [newName, setNewName]     = useState("");
  const [newRole, setNewRole]     = useState("user");
  const [creating, setCreating]   = useState(false);
  const [err, setErr]             = useState("");
  const [adminTab, setAdminTab]   = useState("users");
  const [loading, setLoading]     = useState(true);

  useEffect(() => {
    setLoading(true);
    window.__FB.getUsers().then(u => { setUsers(u); setLoading(false); });
    const unsub = window.__FB.listenAllQuotes(q => setAllQuotes(q));
    return () => unsub();
  }, []);

  const createUser = async (e) => {
    e.preventDefault();
    if (!newEmail || !newPwd || !newName) { setErr("Completa todos los campos"); return; }
    setCreating(true); setErr("");
    try {
      const cred = await window.__FB.createUser(newEmail.trim().toLowerCase(), newPwd);
      const profile = { uid: cred.user.uid, email: cred.user.email, name: newName.trim(), role: newRole, createdAt: Date.now() };
      await window.__FB.saveUserProfile(cred.user.uid, profile);
      setUsers(u => [...u, profile]);
      setNewEmail(""); setNewPwd(""); setNewName(""); setNewRole("user");
    } catch(e) {
      const msgs = {
        "auth/email-already-in-use": "Este email ya está registrado",
        "auth/weak-password":        "Contraseña de al menos 6 caracteres",
        "auth/invalid-email":        "Email inválido",
      };
      setErr(msgs[e.code] || e.message);
    } finally { setCreating(false); }
  };

  const deleteUser = async (uid, name) => {
    if (!confirm(`¿Eliminar a ${name}? Solo se elimina su perfil.`)) return;
    await window.__FB.deleteUserProfile(uid);
    setUsers(u => u.filter(x => x.uid !== uid));
  };

  const statsByUser = useMemo(() => {
    const map = {};
    for (const q of allQuotes) {
      if (!q.userId) continue;
      map[q.userId] = map[q.userId] || { count: 0, total: 0 };
      map[q.userId].count++;
      if (q.concretada) map[q.userId].total += Number(q.total) || 0;
    }
    return map;
  }, [allQuotes]);

  const totalGlobal = allQuotes.filter(q=>q.concretada).reduce((s,q)=>s+(Number(q.total)||0),0);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(6px)',zIndex:9100,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'20px 12px',overflowY:'auto'}}>

        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--line)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,letterSpacing:'.04em'}}>👑 Panel de Admin</div>
            <div style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:'.2em',color:'var(--ink-mute)',textTransform:'uppercase',marginTop:2}}>Solo visible para administradores</div>
          </div>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={14}/></button>
        </div>
        <div style={{display:'flex',gap:2,padding:'10px 12px 0',borderBottom:'1px solid var(--line)'}}>
          {[['users','👥 Usuarios'],['stats','📊 Resumen']].map(([id,lbl]) => (
            <button key={id} onClick={()=>setAdminTab(id)}
              style={{padding:'8px 14px',borderRadius:'8px 8px 0 0',border:'1px solid var(--line)',borderBottom:'none',fontSize:12,fontWeight:600,
                background:adminTab===id?'var(--panel-2)':'transparent',
                color:adminTab===id?'var(--gold-2)':'var(--ink-mute)',cursor:'pointer'}}>
              {lbl}
            </button>
          ))}
        </div>
        <div style={{padding:'14px 16px 20px'}}>
          {adminTab === 'users' && (
            <>
              <div style={{marginBottom:16}}>
                <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--ink-mute)',textTransform:'uppercase',marginBottom:10}}>Usuarios registrados ({users.length})</div>
                {loading ? <div style={{color:'var(--ink-mute)',fontSize:13,padding:'10px 0'}}>Cargando…</div>
                  : users.map(u => (
                  <div key={u.uid} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg-2)',border:'1px solid var(--line)',borderRadius:10,marginBottom:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:14}}>{u.name}</div>
                      <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--ink-mute)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email}</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                      <span style={{fontFamily:'var(--mono)',fontSize:10,padding:'2px 8px',border:'1px solid',borderRadius:999,
                        color:u.role==='admin'?'var(--gold-2)':'var(--ink-mute)',
                        borderColor:u.role==='admin'?'rgba(var(--accent-rgb),.4)':'var(--line)'}}>

                  </div>

                    <label>Email</label>
                    <div className="control"><input type="email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="usuario@email.com"/></div>

          )}
          {adminTab === 'stats' && (
            <>
              <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.2em',color:'var(--ink-mute)',textTransform:'uppercase',marginBottom:12}}>Actividad por usuario</div>
              {users.map(u => {

                      <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-mute)',marginTop:3}}>{s.count} cotización{s.count===1?'':'es'}</div>
                    </div>
                    <div style={{textAlign:'right'}}>

// ---------- SalesList (expandable) ----------
function SalesList({ quotes, prices }){

  return (
    <div className="report-list">
      {quotes.map(q => {
        const isOpen = expanded === q.id;
        const c = computeCommissions(q, prices);
        const { totalCost, profit } = quoteCostAndProfit(q, prices);
        return (
          <div key={q.id} className="report-item" style={{cursor:'pointer',transition:'all .2s'}} onClick={() => toggle(q.id)}>
            <div className="ri-head">
              <div className="ri-client">{q.client || <em>Sin cliente</em>}</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div className="ri-total">${fmtCLP(q.total)}</div>

              <span className="sep">·</span>

            {isOpen && (
              <div className="fade-in" style={{marginTop:10}}>
                <div style={{borderTop:'1px solid var(--line)',paddingTop:10}}>
                  <div className="eyebrow" style={{marginBottom:8}}>Detalle de productos</div>
                  {q.lines.map((l, i) => {
                    if (l.category === INSUMO_KEY) {
                      // Mostrar valor de venta (insumoValor × qty), no insumoPrice que puede confundirse con costo
                      const displayPrice = (l.insumoValor !== undefined && l.insumoValor !== null)

                      return (
                        <div key={i} style={{padding:'4px 0',fontSize:13,color:'var(--ink-dim)'}}>

                          ))}

                    const sub = price * (Number(l.grams) || 0);

// ---------- Calculator Tab ----------
function CalcTab({ clientName, setClientName, pago, setPago, scheduler, setScheduler, attendant, setAttendant, concretada, setConcretada, lines, prices, addLine, removeLine, updateLine, totals, resetCalc, saveQuote, copyMessage, canCopy, customTotal, setCustomTotal }){
  const [openPickerId, setOpenPickerId] = useState(null);
  const [editingTotal, setEditingTotal] = useState(false);
  const displayTotal = customTotal !== "" ? (Number(customTotal.toString().replace(/\D/g,"")) || 0) : totals.total;
  const saleSummary = useMemo(() => {
    const grams = { cadena: 0, micro: 0, italy: 0, gf18k: 0 };
    const regularGroupMap = {
      collar_pulsera_mujer_925: 'cadena',
      collar_pulsera_hombre_925: 'cadena',
      aros_colgantes_925: 'cadena',
      anillos_925: 'cadena',
      collar_pulsera_micro: 'micro',
      italiana_925: 'italy',
      gf_18k: 'gf18k',
    };
    const loteGroupMap = { cadena: 'cadena', micro: 'micro', italiana: 'italy', gf18k: 'gf18k' };
    let totalCost = 1000;
    const insumos = [];

    for (const line of lines) {
      if (line.category === INSUMO_KEY) {
        const cost = Number(line.insumoCost) || Number(line.insumoPrice) || 0;
        const qty = 1;
        totalCost += cost * qty;
        if (cost > 0 || line.insumoName) {
          insumos.push({
            name: line.insumoName || 'Insumo',
            cost: cost * qty,
          });
        }
        continue;
      }

      if (line.category === LOTE_KEY) {
        const loteCostMap = {
          cadena: 'collar_pulsera_mujer_925',
          micro: 'collar_pulsera_micro',
          italiana: 'italiana_925',
          gf18k: 'gf_18k',
        };
        for (const [typeKey, groupKey] of Object.entries(loteGroupMap)) {
          const g = Number((line.loteGramsMap || {})[typeKey]) || 0;
          grams[groupKey] += g;
          const cat = prices[loteCostMap[typeKey]];
          totalCost += effectiveCost(cat, totals.tier) * g;
        }
        continue;
      }

      const g = Number(line.grams) || 0;
      const groupKey = regularGroupMap[line.category];
      if (groupKey) grams[groupKey] += g;
      totalCost += effectiveCost(prices[line.category], totals.tier) * g;
    }

    return { grams, insumos, totalCost, profit: (Number(totals.total) || 0) - totalCost };
  }, [lines, prices, totals.tier, totals.total]);
  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-head">
          <h2>Detalles de <em>venta</em></h2>
          <span className="eyebrow">N.º {lines.length}</span>
        </div>
        <div className="client">
          <div className="control-labeled">
            <label>A quién le pago</label>
            <div className="control">
              <select value={pago} onChange={e => setPago(e.target.value)}>
                <option value="">—</option>
                {TEAM.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
          <div className="control-labeled">
            <label>Nombre del cliente (opcional)</label>
            <div className="control">
              <input
                type="text"
                value={clientName}
                onChange={e => setClientName(e.target.value)}
                placeholder="Ej. María Fernández"
              />
            </div>
          </div>
          <div className="control-labeled">
            <label>Agendó</label>
            <div className="control">
              <select value={scheduler} onChange={e => setScheduler(e.target.value)}>
                <option value="">—</option>
                {TEAM.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
          <div className="control-labeled">
            <label>Atendió</label>
            <div className="control">
              <select value={attendant} onChange={e => setAttendant(e.target.value)}>
                <option value="">—</option>
                {TEAM.map(n => <option key={n} value={n}>{n}</option>)}
              </select>
            </div>
          </div>
        </div>

        <div className="lines">
          {lines.map((line, i) => {
            const isInsumo = line.category === INSUMO_KEY;
            const isLote   = line.category === LOTE_KEY;
            const cat = (!isInsumo && !isLote) ? prices[line.category] : null;
            const tierPrice = cat ? cat.prices[totals.tier] : 0;
            const price = (!isInsumo && !isLote) ? (Number(line.customPrice) || 0) : tierPrice;
            const g = Number(line.grams) || 0;
            const insumoCostVal  = Number(line.insumoCost)  || Number(line.insumoPrice) || 0;
            const insumoValorVal = Number(line.insumoValor) || insumoCostVal;
            const insumoQtyVal   = 1;
            const showHighInsumoQtyWarning = false;
            const lotePriceVal   = Number(line.lotePrice)   || 0;
            const sub = isInsumo ? insumoValorVal : isLote ? lotePriceVal : price * g;
            return (
              <div className={`line${isInsumo ? ' line-insumo' : ''}`} key={line.id}>
                <span className="line-idx">N°{String(i+1).padStart(2,'0')}</span>
                {(isInsumo || isLote) ? (
                  <>
                    <div className="field line-category-field" style={{gridColumn:'1 / -1'}}>
                      <label>Categoría</label>
                      <div className="control">
                        <select value={line.category} onChange={e => updateLine(line.id, { category: e.target.value })}>
                          {CATEGORY_ORDER.map(k => (
                            <option key={k} value={k}>{prices[k].name}</option>
                          ))}
                          <option value={INSUMO_KEY}>Insumos 💎</option>
                          <option value={LOTE_KEY}>Lotes 📦</option>
                        </select>
                      </div>
                    </div>
                    {isInsumo && (
                    <div className="field insumo-name-primary" style={{gridColumn:'1 / -1'}}>
                      <label>Nombre del insumo</label>
                      <div className="control">
                        <input type="text"
                          value={line.insumoName || ''}
                          onChange={e => updateLine(line.id, { insumoName: e.target.value })}
                          placeholder="Ej. Maletero, Caja, etc."
                          style={{paddingRight:0}}
                        />
                        <span className="unit">ðŸ’Ž</span>
                      </div>
                    </div>
                    )}
                    {isInsumo && (
                    <div className="field insumo-cost-field">
                      <label>Costo producto</label>
                      <div className="control">
                        <span className="unit" style={{marginLeft:0,marginRight:6}}>$</span>
                        <input
                          type="number"
                          inputMode="numeric"
                          min="0"
                          value={line.insumoCost || ''}
                          onChange={e => updateLine(line.id, { insumoCost: e.target.value })}
                          placeholder="0"
                        />
                      </div>
                    </div>
                    )}
                    {isInsumo ? (
                      <>
                        <div className="field insumo-qty-field">
                          <label>Cantidad</label>
                          <div className="control">
                            <input type="number" inputMode="numeric" min="1"
                              value={line.insumoQty || ''}
                              onChange={e => updateLine(line.id, { insumoQty: e.target.value })}
                              placeholder="1"
                            />
                            <span className="unit">un.</span>
                          </div>
                        </div>
                        <button className="remove" onClick={() => removeLine(line.id)} aria-label="Eliminar línea" disabled={lines.length === 1}>
                          <Icon name="x" size={14}/>
                        </button>
                        <div className="field insumo-value-field">
                          <label>Precio de venta</label>
                          <div className="control">
                            <span className="unit" style={{marginLeft:0,marginRight:6}}>$</span>
                            <input type="number" inputMode="numeric" min="0"
                              value={line.insumoValor || ''}
                              onChange={e => updateLine(line.id, { insumoValor: e.target.value })}
                              placeholder="0"
                            />
                          </div>
                        </div>
                        <div className="field insumo-name-old" style={{gridColumn:'1 / -1'}}>
                          <label>Nombre del insumo</label>
                          <div className="control">
                            <input type="text"
                              value={line.insumoName || ''}
                              onChange={e => updateLine(line.id, { insumoName: e.target.value })}
                              placeholder="Ej. Maletero, Caja, etc."
                            />
                            <span className="unit">💎</span>
                          </div>
                        </div>
                        {showHighInsumoQtyWarning && (
                          <div className="insumo-note insumo-note-warning" style={{gridColumn:'1 / -1'}}>
                            Revisa si estas ingresando unidades sueltas. Para paquetes de 50/100 bolsas, normalmente va cantidad 1.
                          </div>
                        )}
                        <div className="insumo-note" style={{gridColumn:'1 / -1'}}>
                          Para bolsas/paquetes: usa cantidad 1, costo total del paquete y valor de venta total.
                        </div>
                      </>
                    ) : (
                      <>
                        <button className="remove" style={{gridColumn:'3'}} onClick={() => removeLine(line.id)} aria-label="Eliminar línea" disabled={lines.length === 1}>
                          <Icon name="x" size={14}/>
                        </button>
                        <div style={{gridColumn:'1 / -1', display:'flex', flexDirection:'column', gap:6}}>
                          <div className="field">
                            <label>Nombre del lote</label>
                            <div className="control">
                              <input type="text"
                                value={line.loteName || ''}
                                onChange={e => updateLine(line.id, { loteName: e.target.value })}
                                placeholder="Ej. Lote 1, Navidad, etc."
                              />
                              <span className="unit">📦</span>
                            </div>
                          </div>
                          {LOTE_TYPES.map(t => (
                            <div key={t.key} style={{display:'grid', gridTemplateColumns:'90px 1fr', gap:6, alignItems:'center'}}>
                              <div style={{display:'flex',alignItems:'center',gap:6,padding:'8px 10px',background:'rgba(var(--surface-overlay-rgb),.4)',border:'1px solid var(--line)',borderRadius:8,fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--gold-2)',whiteSpace:'nowrap'}}>
                                <span>{t.emoji}</span><span>{t.label}</span>
                              </div>
                              <div className="control" style={{minHeight:40}}>
                                <input
                                  type="text"
                                  inputMode="decimal"
                                  value={(line.loteGramsMap || {})[t.key] || ''}
                                  onChange={e => updateLine(line.id, { loteGramsMap: { ...(line.loteGramsMap||{}), [t.key]: e.target.value.replace(',', '.') } })}
                                  placeholder="0"
                                  style={{fontSize:13}}
                                />
                                <span className="unit">g</span>
                              </div>
                            </div>
                          ))}
                          <div className="field" style={{marginTop:2}}>
                            <label>Precio</label>
                            <div className="control">
                              <span className="unit" style={{marginLeft:0,marginRight:4}}>$</span>
                              <input type="number" inputMode="numeric" min="0"
                                value={line.lotePrice || ''}
                                onChange={e => updateLine(line.id, { lotePrice: e.target.value })}
                                placeholder="0"
                              />
                            </div>
                          </div>
                        </div>
                      </>
                    )}
                  </>
                ) : (
                  <>
                    <div className="field">
                      <label>Categoría</label>
                      <div className="control">
                        <select value={line.category} onChange={e => updateLine(line.id, { category: e.target.value })}>
                          {CATEGORY_ORDER.map(k => (
                            <option key={k} value={k}>{prices[k].name}</option>
                          ))}
                          <option value={INSUMO_KEY}>Insumos 💎</option>
                          <option value={LOTE_KEY}>Lotes 📦</option>
                        </select>
                      </div>
                    </div>
                    <div className="field">
                      <label>Gramaje</label>
                      <div className="control">
                        <input
                          type="text"
                          inputMode="decimal"
                          value={line.grams}
                          onChange={e => updateLine(line.id, { grams: e.target.value.replace(',', '.') })}
                          placeholder="0"
                        />
                        <span className="unit">g</span>
                      </div>
                    </div>
                    <button className="remove" onClick={() => removeLine(line.id)} aria-label="Eliminar línea" disabled={lines.length === 1}>
                      <Icon name="x" size={14}/>
                    </button>
                  </>
                )}
                {!isInsumo && !isLote && (
                  <div className="field custom-price-field" style={{gridColumn:'1 / -1',marginTop:2}}>
                    <label>Precio a cobrar</label>
                    <div className="control">
                      <span className="unit" style={{marginLeft:0,marginRight:6}}>$</span>
                      <input
                        type="number"
                        inputMode="numeric"
                        min="0"
                        value={line.customPrice || ''}
                        onChange={e => updateLine(line.id, { customPrice: e.target.value })}
                        placeholder="Precio por gramo"
                      />
                      <span className="unit">CLP/g</span>
                    </div>
                  </div>
                )}
                {!isInsumo && !isLote && (
                  <div className="legacy-price-table" style={{gridColumn:'1 / -1',marginTop:2}}>
                    <button
                      onClick={() => setOpenPickerId(openPickerId === line.id ? null : line.id)}
                      style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 12px',background:'var(--surface-2,rgba(255,255,255,.05))',border:'1px solid var(--line)',borderRadius:8,color:'var(--ink)',fontSize:12,fontFamily:'var(--mono)',cursor:'pointer',transition:'border-color .15s'}}
                    >
                      <span style={{color:'var(--ink-mute)'}}>Tabla de precios</span>
                      <span style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{color: line.customPrice ? 'var(--gold-2)' : 'var(--ink)', fontWeight:600}}>
                          {line.customPrice ? `$${fmtCLP(Number(line.customPrice))}/g · PERSONALIZADO` : `$${fmtCLP(tierPrice)}/g · Auto T-${TIER_RULES[totals.tier].label}`}
                        </span>
                        <span style={{color:'var(--ink-mute)',fontSize:10,transform: openPickerId===line.id ? 'rotate(180deg)' : 'none',transition:'transform .2s'}}>▼</span>
                      </span>
                    </button>
                    {openPickerId === line.id && (
                      <div className="fade-in" style={{marginTop:4,border:'1px solid var(--line)',borderRadius:8,overflow:'hidden'}}>
                        {cat && cat.prices.map((p, i) => {
                          if (i === 0) return null;
                          const isActive = line.customPrice ? Number(line.customPrice) === p : i === totals.tier;
                          return (
                            <button key={i} onClick={() => {
                              updateLine(line.id, { customPrice: i === totals.tier ? '' : String(p) });
                              setOpenPickerId(null);
                            }} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 14px',background: isActive ? 'rgba(var(--accent-rgb),.15)' : 'transparent',border:'none',borderBottom:'1px solid var(--line)',color: isActive ? 'var(--gold-2)' : 'var(--ink)',cursor:'pointer',fontSize:13,fontFamily:'var(--mono)'}}>
                              <span style={{color:'var(--ink-mute)',fontSize:11}}>T-{TIER_RULES[i].label}</span>
                              <span style={{fontWeight: isActive ? 700 : 400}}>${fmtCLP(p)}<span style={{fontSize:10,color:'var(--ink-mute)'}}>/g</span></span>
                            </button>
                          );
                        })}
                        <div style={{padding:'8px 14px',borderTop:'none',background:'transparent'}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom: line.customPrice && !cat.prices.includes(Number(line.customPrice)) ? 6 : 0}}>
                            <span style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--gold-2)',letterSpacing:'.08em',fontWeight:600}}>PERSONALIZADO</span>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
                            <span style={{color:'var(--ink-mute)',fontFamily:'var(--mono)',fontSize:13}}>$</span>
                            <input
                              type="number"
                              inputMode="numeric"
                              min="0"
                              value={line.customPrice && !cat.prices.map(String).includes(String(line.customPrice)) ? line.customPrice : ''}
                              onChange={e => updateLine(line.id, { customPrice: e.target.value })}
                              placeholder="Ingresar precio/g"
                              style={{flex:1,background:'var(--surface-2,rgba(255,255,255,.06))',border:'1px solid var(--line)',borderRadius:6,padding:'6px 10px',color:'var(--ink)',fontFamily:'var(--mono)',fontSize:13}}
                            />
                            <span style={{color:'var(--ink-mute)',fontSize:11,fontFamily:'var(--mono)'}}>CLP/g</span>
                            {line.customPrice && (
                              <button onClick={() => { updateLine(line.id, { customPrice: '' }); setOpenPickerId(null); }}
                                style={{padding:'4px 8px',background:'transparent',border:'1px solid var(--line)',borderRadius:6,color:'var(--ink-mute)',fontSize:11,cursor:'pointer'}}>Auto</button>
                            )}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}
                <div className="line-meta">
                  {isInsumo ? (
                    <>
                      <span className="price-tag insumo-price-tag-clean">
                        {insumoQtyVal === 1 ? (
                          <>Insumo &middot; ${fmtCLP(insumoValorVal)}</>
                        ) : (
                          <>Insumo &middot; {insumoQtyVal} un. &times; ${fmtCLP(insumoValorVal)}</>
                        )}
                      </span>
                      <span className="price-tag insumo-price-tag">
                        {insumoQtyVal === 1
                          ? `Insumo Â· $${fmtCLP(insumoValorVal)}`
                          : `Insumo Â· $${fmtCLP(insumoValorVal)}`}
                      </span>
                      <span className="price-tag">Insumo · {insumoQtyVal} un. × ${fmtCLP(insumoValorVal)}</span>
                      <span className="subtotal">${fmtCLP(sub)}</span>
                    </>
                  ) : isLote ? (
                    <>
                      <span className="price-tag">Lote 📦{line.loteName ? ` · ${line.loteName}` : ''}{Object.values(line.loteGramsMap||{}).reduce((s,v)=>s+(Number(v)||0),0) ? ` · ${Object.values(line.loteGramsMap||{}).reduce((s,v)=>s+(Number(v)||0),0)}g` : ''} · precio fijo</span>
                      <span className="subtotal">${fmtCLP(sub)}</span>
                    </>
                  ) : (
                    <>
                      <span className="price-tag">
                        {`$${fmtCLP(price)}/g · precio a cobrar`}
                      </span>
                      <span className="subtotal">${fmtCLP(sub)}</span>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:'0 16px 16px'}}>
          <button className="add-line" onClick={addLine}>
            <span className="plus">+</span> Añadir línea
          </button>
        </div>
      </div>

      <div className="card">
        <div className="card-head">
          <h2>Resumen</h2>
          <span className="eyebrow">Cálculo automático</span>
        </div>
        <div className="summary">
          <div className="tier">
            <div className="tier-badge">{TIER_RULES[totals.tier].label}</div>
            <div className="tier-body">
              <div className="eyebrow">Tramo aplicado</div>
              <div className="why"><strong>{TIER_RULES[totals.tier].desc}.</strong> {totals.reason}.</div>
              {isKileroTier(totals.tier) && (
                <div style={{display:'inline-flex',alignItems:'center',gap:4,marginTop:6,background:'rgba(var(--accent-rgb),.15)',border:'1px solid rgba(var(--accent-rgb),.4)',borderRadius:6,padding:'3px 8px',fontSize:11,fontFamily:'var(--mono)',color:'var(--gold-2)',letterSpacing:'.1em'}}>
                  ◆ KILERO ACTIVO
                </div>
              )}
            </div>
          </div>
          <div className="totals">
            <div className="row">
              <span className="k">Peso total</span>
              <span className="v">{fmtCLP(totals.totalWeight)} g</span>
            </div>
            <div className="row">
              <span className="k">Líneas</span>
              <span className="v">{lines.filter(l => {
                if (l.category === LOTE_KEY) return l.loteGramsMap ? Object.values(l.loteGramsMap).some(v => Number(v) > 0) : Number(l.grams) > 0;
                if (l.category === INSUMO_KEY) return Number(l.insumoCost) > 0 || !!(l.insumoName && l.insumoName.trim());
                return Number(l.grams) > 0;
              }).length} de {lines.length}</span>
            </div>
            <div className="row grand">
              <span className="k">Total</span>
              <span className="v"><span className="currency">CLP</span>${fmtCLP(totals.total)}</span>
            </div>
            <div className="summary-block">
              <h3>GRAMOS VENDIDOS</h3>
              <div className="row">
                <span className="k">Cadena</span>
                <span className="v">{fmtCLP(saleSummary.grams.cadena)} g</span>
              </div>
              <div className="row">
                <span className="k">Micro</span>
                <span className="v">{fmtCLP(saleSummary.grams.micro)} g</span>
              </div>
              <div className="row">
                <span className="k">Italy</span>
                <span className="v">{fmtCLP(saleSummary.grams.italy)} g</span>
              </div>
              <div className="row">
                <span className="k">GF 18 K</span>
                <span className="v">{fmtCLP(saleSummary.grams.gf18k)} g</span>
              </div>
            </div>
            <div className="summary-block">
              <h3>INSUMOS VENDIDOS</h3>
              {saleSummary.insumos.length ? saleSummary.insumos.map((insumo, idx) => (
                <div className="row" key={`${insumo.name}-${idx}`}>
                  <span className="k">{insumo.name}</span>
                  <span className="v">(${fmtCLP(insumo.cost)})</span>
                </div>
              )) : (
                <div className="row muted">
                  <span className="k">Sin insumos</span>
                  <span className="v">($0)</span>
                </div>
              )}
            </div>
            <div className="summary-block sale-detail">
              <h3>DETALLES VENTA</h3>
              <div className="row">
                <span className="k">+ Venta Total</span>
                <span className="v">${fmtCLP(totals.total)}</span>
              </div>
              <div className="row">
                <span className="k">- Costo Total</span>
                <span className="v">${fmtCLP(saleSummary.totalCost)}</span>
              </div>
              <div className="row grand">
                <span className="k">Utilidad Total</span>
                <span className="v"><span className="currency">CLP</span>${fmtCLP(saleSummary.profit)}</span>
              </div>
              <div className="row cobrar">
                <span className="k" style={{display:'flex',alignItems:'center',gap:6}}>
                  Total Venta a Cobrar
                  <button
                    onClick={()=>{ setEditingTotal(e=>!e); if(editingTotal) setCustomTotal(""); }}
                    style={{background:'none',border:'none',cursor:'pointer',padding:'2px 4px',borderRadius:4,color: customTotal !== "" ? 'var(--gold-2)' : 'var(--ink-mute)',fontSize:11,lineHeight:1}}
                    title={customTotal !== "" ? "Restaurar precio calculado" : "Personalizar monto"}
                  >{customTotal !== "" ? "✕ reset" : "✏︎"}</button>
                </span>
                {editingTotal ? (
                  <input
                    type="number"
                    value={customTotal}
                    onChange={e => setCustomTotal(e.target.value)}
                    onBlur={()=>{ if(customTotal==="") setEditingTotal(false); }}
                    placeholder={String(totals.total)}
                    autoFocus
                    style={{fontFamily:'var(--serif)',fontSize:28,fontWeight:700,color:'var(--gold-2)',background:'transparent',border:'none',borderBottom:'2px solid var(--gold-2)',outline:'none',width:'100%',textAlign:'right',padding:'2px 0'}}
                  />
                ) : (
                  <span className="v" style={customTotal !== "" ? {color:'var(--gold-2)',textDecoration:'none'} : {}}>
                    <span className="currency">CLP</span>${fmtCLP(displayTotal)}
                    {customTotal !== "" && <span style={{display:'block',fontSize:10,color:'var(--ink-mute)',fontFamily:'var(--mono)',fontWeight:400,marginTop:2}}>calculado: ${fmtCLP(totals.total)}</span>}
                  </span>
                )}
              </div>
            </div>
          </div>
          <div className="actions">
            <button className="btn ghost" onClick={resetCalc}>Limpiar</button>
            <button className="btn primary" onClick={saveQuote}>Guardar cotización</button>
            <button className="btn accent" onClick={copyMessage} disabled={!canCopy} style={{flexBasis:'100%'}}>
              <span style={{fontSize:'18px'}}>📋</span> Copiar mensaje
            </button>
          </div>
        </div>
      </div>

      <div className="flourish" style={{margin:'26px 0 0'}}>
        <span>Aravena · Orfebrería</span>
      </div>
    </div>
  );
}

// ---------- History Tab ----------
function HistoryTab({ history, prices, onDelete, onDuplicate, onShare, onToggleConcretada }){
  const [q, setQ] = useState("");
  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return history;
    return history.filter(h =>
      (h.client || '').toLowerCase().includes(needle) ||
      (h.scheduler || '').toLowerCase().includes(needle) ||
      (h.attendant || '').toLowerCase().includes(needle) ||
      h.lines.some(l => l.category === INSUMO_KEY
        ? (l.insumoName || '').toLowerCase().includes(needle)
        : l.category === LOTE_KEY
        ? (l.loteType || '').toLowerCase().includes(needle)
        : ((prices[l.category] && prices[l.category].name) || '').toLowerCase().includes(needle))
    );
  }, [q, history, prices]);

  return (
    <div className="fade-in">
      <div className="history-search">
        <Icon name="search" size={15}/>
        <input
          type="text" placeholder="Buscar por cliente o categoría…"
          value={q} onChange={e => setQ(e.target.value)}
        />
        {q && <button className="icon-btn" style={{width:28,height:28}} onClick={()=>setQ("")} aria-label="Limpiar búsqueda"><Icon name="x" size={12}/></button>}
      </div>

      {filtered.length === 0 ? (
        <div className="card">
          <div className="empty">
            <div className="diamond"/>
            <p>{history.length === 0 ? "Aún no hay cotizaciones guardadas." : "Sin resultados."}</p>
            <div className="hint">{history.length === 0 ? "Crea una desde la Calculadora" : "Prueba otra búsqueda"}</div>
          </div>
        </div>
      ) : (
        <div className="card">
          {filtered.map(h => (
            <div className="quote" key={h.id}>
              <div className="quote-head">
                <div className="quote-name">
                  {h.client || <em>Sin cliente</em>}
                </div>
                <div className="quote-date">{fmtDate(h.at)}</div>
              </div>
              {(h.scheduler || h.attendant) && (
                <div className="quote-staff">
                  {h.scheduler && <span>Agendó: <b>{normName(h.scheduler)}</b></span>}
                  {h.scheduler && h.attendant && <span className="sep">·</span>}
                  {h.attendant && <span>Atendió: <b>{normName(h.attendant)}</b></span>}
                </div>
              )}
              <div className="quote-lines">
                {h.lines.map((l, i) => (
                  <React.Fragment key={i}>
                    {i > 0 && <span className="sep">·</span>}
                    {l.category === INSUMO_KEY
                      ? (() => {
                          const esRegalo = (l.insumoValor !== undefined && l.insumoValor !== null) ? Number(l.insumoValor) === 0 : (l.insumoPrice || 0) === 0;
                          const displayVal = (l.insumoValor !== undefined && l.insumoValor !== null) ? Number(l.insumoValor) * (Number(l.insumoQty)||1) : (l.insumoPrice || 0);
                          return <>{l.insumoName || 'Insumo'} 💎 {esRegalo
                            ? <span style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:10,background:'rgba(var(--accent-rgb),.15)',border:'1px solid rgba(var(--accent-rgb),.35)',color:'var(--gold-2)',borderRadius:4,padding:'1px 5px',letterSpacing:'.06em'}}>🎁 REGALO</span>
                            : <span style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:11}}>${fmtCLP(displayVal)}</span>
                          }</>;
                        })()
                      : l.category === LOTE_KEY
                      ? <>📦 Lote{l.loteName ? ` ${l.loteName}` : ''}{l.grams ? ` ${l.grams}g` : ''} <span style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:11}}>${fmtCLP(l.lotePrice || 0)}</span></>
                      : <>{(prices[l.category] && prices[l.category].name) || l.category} <span style={{fontStyle:'normal',fontFamily:'var(--mono)',fontSize:11}}>{l.grams}g</span></>
                    }
                  </React.Fragment>
                ))}
              </div>
              <div className="quote-foot">
                <div>
                  <div className="quote-total"><span className="currency">CLP</span>${fmtCLP(h.total)}</div>
                  {h.pago && <div className="quote-tier" style={{marginTop:4}}>Pago: {normName(h.pago)}</div>}
                </div>
                <div className="quote-actions">
                  <button className="icon-btn" onClick={()=>onShare(h)} aria-label="Compartir por WhatsApp"><Icon name="share" size={14}/></button>
                  <button className="icon-btn" onClick={()=>onDuplicate(h)} aria-label="Duplicar"><Icon name="copy" size={14}/></button>
                  <button className="icon-btn danger" onClick={()=>{ if (confirm('¿Eliminar esta cotización?')) onDelete(h.id); }} aria-label="Eliminar"><Icon name="trash" size={14}/></button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="flourish" style={{margin:'26px 0 0'}}>
        <span>{history.length} cotización{history.length === 1 ? '' : 'es'} guardada{history.length === 1 ? '' : 's'}</span>
      </div>
    </div>
  );
}
