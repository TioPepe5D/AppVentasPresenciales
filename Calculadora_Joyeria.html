// ---------- Reports Tab ----------
// ── helpers de período ──
const dayKey  = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const weekKey = (ts) => {
  const d = new Date(ts);
  // ISO week: lunes = día 1
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
  return `${mon.getFullYear()}-W${String(getISOWeek(mon)).padStart(2,'0')}`;
};
const getISOWeek = (d) => {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4); startOfWeek1.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  return Math.ceil(((d - startOfWeek1) / 86400000 + 1) / 7);
};
const yearKey     = (ts) => String(new Date(ts).getFullYear());
const quarterKey  = (ts) => { const d=new Date(ts); return `${d.getFullYear()}-Q${Math.floor(d.getMonth()/3)+1}`; };
const semesterKey = (ts) => { const d=new Date(ts); return `${d.getFullYear()}-H${d.getMonth()<6?1:2}`; };

const dayLabel  = (k) => { const [y,m,d] = k.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('es-CL',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}); };
const weekLabel = (k) => {
  const [yearStr, wStr] = k.split('-W');
  const year = +yearStr, week = +wStr;
  const jan4 = new Date(year, 0, 4);
  const startW1 = new Date(jan4); startW1.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  const mon = new Date(startW1); mon.setDate(startW1.getDate() + (week-1)*7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = (d) => d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'});
  return `${fmt(mon)} – ${fmt(sun)}`;
};
const yearLabel     = (k) => k;
const quarterLabel  = (k) => { const [y,q]=k.split('-Q'); return `${q}°T ${y}`; };
const semesterLabel = (k) => { const [y,h]=k.split('-H'); return `${h}°S ${y}`; };

function ReportsTab({ history, prices, onToggleConcretada }){
  const [period, setPeriod] = useState('monthly');
  const [navIdx, setNavIdx] = useState(0);
  const [salesOpen, setSalesOpen] = useState(false);

  useEffect(()=>{ setNavIdx(0); setSalesOpen(false); },[period]);

  const allDays = useMemo(()=>{ const s=new Set(history.map(q=>dayKey(q.at))); s.add(dayKey(Date.now())); return [...s].sort().reverse(); },[history]);
  const allWeeks = useMemo(()=>{ const s=new Set(history.map(q=>weekKey(q.at))); s.add(weekKey(Date.now())); return [...s].sort().reverse(); },[history]);
  const allMonths = useMemo(()=>{ const s=new Set(history.map(q=>monthKey(q.at))); s.add(monthKey(Date.now())); return [...s].sort().reverse(); },[history]);
  const allYears = useMemo(()=>{ const s=new Set(history.map(q=>yearKey(q.at))); s.add(yearKey(Date.now())); return [...s].sort().reverse(); },[history]);

  const { activeList, labelFn, keyFn, periodName } = useMemo(()=>{
    if(period==='daily')  return { activeList:allDays,   labelFn:dayLabel,   keyFn:dayKey,   periodName:'Diario'  };
    if(period==='weekly') return { activeList:allWeeks,  labelFn:weekLabel,  keyFn:weekKey,  periodName:'Semanal' };
    if(period==='yearly') return { activeList:allYears,  labelFn:yearLabel,  keyFn:yearKey,  periodName:'Anual'   };
    return                       { activeList:allMonths, labelFn:monthLabel, keyFn:monthKey, periodName:'Mensual' };
  },[period,allDays,allWeeks,allMonths,allYears]);

  const boundedIdx = Math.min(navIdx, Math.max(0, activeList.length-1));
  const activeKey   = activeList[boundedIdx] || '';
  const activeLabel = activeKey ? labelFn(activeKey) : '';

  const periodQuotes = useMemo(()=>history.filter(q=>keyFn(q.at)===activeKey&&q.concretada),[history,keyFn,activeKey]);

  // Período anterior para delta
  const prevKey = useMemo(()=>{
    const idx=activeList.indexOf(activeKey);
    return idx>=0&&idx<activeList.length-1?activeList[idx+1]:null;
  },[activeList,activeKey]);
  const prevQuotes = useMemo(()=>prevKey?history.filter(q=>keyFn(q.at)===prevKey&&q.concretada):[]
  ,[history,keyFn,prevKey]);
  const prevVentas = useMemo(()=>prevQuotes.reduce((s,q)=>s+(Number(q.total)||0),0),[prevQuotes]);
  const prevGanancia = useMemo(()=>prevQuotes.reduce((s,q)=>s+quoteCostAndProfit(q,prices).profit,0),[prevQuotes,prices]);

  // Ranking vendedores (todos los datos históricos)
  const vendedoresRanking = useMemo(()=>{
    const byP={};
    for(const q of history){
      if(!q.concretada) continue;
      const k=normName((q.attendant||'').trim()||EMPRESA);
      if(!byP[k]) byP[k]={name:k,total:0,count:0};
      byP[k].total+=Number(q.total)||0; byP[k].count++;
    }
    const rows=Object.values(byP).filter(p=>p.count>0).sort((a,b)=>b.total-a.total);
    return {rows,maxT:rows[0]?.total||1};
  },[history]);

  // Ranking agendadores (todos los datos históricos)
  const agendadoresRanking = useMemo(()=>{
    const byP={};
    for(const q of history){
      if(!q.concretada) continue;
      const k=normName((q.scheduler||'').trim()||EMPRESA);
      if(!byP[k]) byP[k]={name:k,count:0};
      byP[k].count++;
    }
    const rows=Object.values(byP).filter(p=>p.count>0).sort((a,b)=>b.count-a.count);
    return {rows,maxC:rows[0]?.count||1};
  },[history]);

  const salesPattern = useMemo(()=>{
    const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
    const byDow=Array(7).fill(0).map((_,i)=>({label:DAYS[i],total:0,count:0}));
    const bySlot=Array(12).fill(0).map((_,i)=>({label:`${String(i*2).padStart(2,'0')}:00`,total:0,count:0}));
    for(const q of history){
      if(!q.concretada) continue;
      const d=new Date(q.at);
      const dow=(d.getDay()+6)%7;
      byDow[dow].total+=Number(q.total)||0; byDow[dow].count++;
      const slot=Math.min(11,Math.floor(d.getHours()/2));
      bySlot[slot].total+=Number(q.total)||0; bySlot[slot].count++;
    }
    const topDow=[...byDow].sort((a,b)=>b.total-a.total).slice(0,3).filter(d=>d.count>0);
    const topSlot=[...bySlot].sort((a,b)=>b.total-a.total).slice(0,3).filter(d=>d.count>0);
    return {topDow,topSlot,maxDow:topDow[0]?.total||1,maxSlot:topSlot[0]?.total||1,hasData:byDow.some(d=>d.count>0)};
  },[history]);

  // Ventas por persona — período activo
  const personRanking = useMemo(()=>{
    const byP={};
    for(const q of periodQuotes){
      const k=normName((q.attendant||'').trim()||EMPRESA);
      if(!byP[k]) byP[k]={name:k,total:0,count:0};
      byP[k].total+=Number(q.total)||0; byP[k].count++;
    }
    const rows=Object.values(byP).sort((a,b)=>b.total-a.total);
    return {rows,maxT:rows[0]?.total||1};
  },[periodQuotes]);

  const [sortCol, setSortCol] = useState('grams');
  const productStats = useMemo(()=>{
    const CAT_TO_GROUP={
      collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',
      collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',
      italiana_925:'italiana',gf_18k:'gf18k',
    };
    const G={
      cadena:{name:'Cadena',emoji:'🔗',count:0,grams:0,revenue:0},
      micro: {name:'Micro', emoji:'💎',count:0,grams:0,revenue:0},
      italiana:{name:'Italiana',emoji:'🇮🇹',count:0,grams:0,revenue:0},
      gf18k:{name:'GF 18K',emoji:'☀️',count:0,grams:0,revenue:0},
    };
    for(const q of periodQuotes){
      const seen=new Set();
      for(const l of(q.lines||[])){
        if(l.category===INSUMO_KEY) continue;
        if(l.category===LOTE_KEY){
          const gm=l.loteGramsMap||{};
          for(const k of['cadena','micro','italiana','gf18k']){const g=Number(gm[k])||0;if(g>0){G[k].grams+=g;seen.add(k);}}
        } else {
          const grp=CAT_TO_GROUP[l.category]; if(!grp) continue;
          const g=Number(l.grams)||0; if(!g) continue;
          const price=(prices[l.category]?.prices[q.tier])||0;
          G[grp].grams+=g; G[grp].revenue+=g*price; seen.add(grp);
        }
      }
      seen.forEach(k=>G[k].count++);
    }
    const totG=Object.values(G).reduce((s,v)=>s+v.grams,0);
    return Object.entries(G)
      .map(([key,v])=>({key,name:v.name,emoji:v.emoji,count:v.count,grams:Math.round(v.grams*10)/10,avg:v.count?Math.round(v.grams/v.count*10)/10:0,revenue:Math.round(v.revenue),pct:totG?Math.round(v.grams/totG*100):0}))
      .filter(x=>x.grams>0).sort((a,b)=>b.grams-a.grams);
  },[periodQuotes,prices]);

  // Conversión: cotizaciones totales del período (concretadas + no concretadas)
  const totalCotizaciones = useMemo(()=>history.filter(q=>keyFn(q.at)===activeKey).length,[history,keyFn,activeKey]);

  const summary = useMemo(()=>{
    const byPerson={};
    let totalVentas=0,totalCostos=0,totalGanancia=0;
    const gramsByGroup={cadena:0,micro:0,italiana:0,gf18k:0};
    const catToGroup={collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',italiana_925:'italiana',gf_18k:'gf18k'};
    const inc=(n,k,v)=>{ byPerson[n]=byPerson[n]||{agendado:0,atendido:0,empresa:0}; byPerson[n][k]+=v; };
    for(const q of periodQuotes){
      const total=Number(q.total)||0;
      const {totalCost,profit}=quoteCostAndProfit(q,prices);
      const base=Math.max(0,profit);
      totalVentas+=total; totalCostos+=totalCost; totalGanancia+=profit;
      inc(normName((q.scheduler||'').trim()||EMPRESA),'agendado',base*PCT_SCHEDULER);
      inc(normName((q.attendant||'').trim()||EMPRESA),'atendido',base*PCT_ATTENDANT);
      inc(EMPRESA,'empresa',base*PCT_EMPRESA);
      for(const l of(q.lines||[])){
        if(l.category===LOTE_KEY){ const gm=l.loteGramsMap||{}; for(const k of['cadena','micro','italiana','gf18k']) gramsByGroup[k]+=(Number(gm[k])||0); }
        else if(catToGroup[l.category]) gramsByGroup[catToGroup[l.category]]+=Number(l.grams)||0;
      }
    }
    const pagosByPerson={};
    for(const q of periodQuotes){ const who=normName((q.pago||'').trim()); if(who){ pagosByPerson[who]=(pagosByPerson[who]||0)+(Number(q.total)||0); } }
    const rows=Object.entries(byPerson).map(([name,v])=>({name,...v,comision:v.agendado+v.atendido+v.empresa})).filter(r=>r.comision>0).sort((a,b)=>b.comision-a.comision);
    const totalComisionEquipo=rows.reduce((s,r)=>s+r.agendado+r.atendido,0);
    const totalEmpresa=rows.reduce((s,r)=>s+r.empresa,0);
    const margen=totalVentas>0?Math.round(totalGanancia/totalVentas*100):0;
    return {rows,totalVentas,totalCostos,totalGanancia,totalComisionEquipo,totalEmpresa,gramsByGroup,margen};
  },[periodQuotes,prices]);

  const exportCSV = () => {
    const catToGroup={collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',italiana_925:'italiana',gf_18k:'gf18k'};
    const header=["Fecha","Cliente","Agendó","Atendió","Gramos Total","G. Cadena","G. Micro","G. Italiana","G. GF 18K","Venta","Costo","Ganancia","Com. Agendó (35%)","Com. Atendió (35%)","Com. Empresa (30%)"];
    const r1=x=>{const n=Math.round((x||0)*10)/10; return n===0?'':n.toLocaleString('es-CL',{maximumFractionDigits:1});};
    const b0=n=>n===0?'':n;
    const rows=periodQuotes.map(q=>{
      const {totalCost,profit}=quoteCostAndProfit(q,prices);
      const base=Math.max(0,profit);
      const d=new Date(q.at);
      const fecha=d.toLocaleDateString('es-CL')+' '+d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      const g={cadena:0,micro:0,italiana:0,gf18k:0};
      for(const l of(q.lines||[])){ if(l.category===LOTE_KEY){const gm=l.loteGramsMap||{};for(const k of['cadena','micro','italiana','gf18k'])g[k]+=Number(gm[k])||0;}else if(catToGroup[l.category])g[catToGroup[l.category]]+=Number(l.grams)||0; }
      return [fecha,q.client||'',normName(q.scheduler||EMPRESA),normName(q.attendant||EMPRESA),r1(q.totalWeight),r1(g.cadena),r1(g.micro),r1(g.italiana),r1(g.gf18k),b0(Number(q.total)||0),b0(Math.round(totalCost)),b0(Math.round(profit)),b0(Math.round(base*PCT_SCHEDULER)),b0(Math.round(base*PCT_ATTENDANT)),b0(Math.round(base*PCT_EMPRESA))];
    });
    const esc=v=>{const s=String(v??'');return /[",;\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;};
    const csv=[header,...rows.reverse()].map(r=>r.map(esc).join(';')).join('\r\n');
    const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`ventas_${period}_${activeKey}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  // Inteligencia de negocio
  const insights = useMemo(()=>{
    const catToGroup={collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',italiana_925:'italiana',gf_18k:'gf18k'};
    const groupLabels={cadena:'Cadena 🔗',micro:'Micro 💎',italiana:'Italiana 🇮🇹',gf18k:'GF 18K ☀️'};
    const isCurrentPeriod=keyFn(Date.now())===activeKey;

    // Días activos vs total del período
    const activeDaySet=new Set(periodQuotes.map(q=>dayKey(q.at)));
    const activeDays=activeDaySet.size;
    let totalDays=1;
    if(period==='monthly'){
      const parts=activeKey.split('-');
      totalDays=new Date(Number(parts[0]),Number(parts[1]),0).getDate();
    } else if(period==='weekly') totalDays=7;
    else if(period==='yearly') totalDays=365;

    // Proyección (solo período actual, mensual o semanal)
    let projection=null;
    if(isCurrentPeriod&&periodQuotes.length>0&&(period==='monthly'||period==='weekly')){
      const now=new Date();
      let start,daysPassed,daysLeft;
      if(period==='monthly'){
        start=new Date(now.getFullYear(),now.getMonth(),1);
        daysPassed=Math.max(1,Math.ceil((Date.now()-start.getTime())/864e5));
        daysLeft=totalDays-daysPassed;
      } else {
        const dow=now.getDay()||7;
        start=new Date(now.getFullYear(),now.getMonth(),now.getDate()-(dow-1));
        daysPassed=Math.max(1,dow);
        daysLeft=7-daysPassed;
      }
      if(daysLeft>0){
        projection=Math.round(summary.totalVentas+(summary.totalVentas/daysPassed)*daysLeft);
      }
    }

    // Persona que más vende (por total atendido)
    const salesByPerson={};
    const schedByPerson={};
    for(const q of periodQuotes){
      const att=normName((q.attendant||'').trim()||EMPRESA);
      if(!salesByPerson[att]) salesByPerson[att]={count:0,total:0};
      salesByPerson[att].count++; salesByPerson[att].total+=Number(q.total)||0;
      const sched=normName((q.scheduler||'').trim()||EMPRESA);
      if(!schedByPerson[sched]) schedByPerson[sched]={count:0};
      schedByPerson[sched].count++;
    }
    const personStar=Object.entries(salesByPerson).filter(([n])=>n!==EMPRESA).sort((a,b)=>b[1].total-a[1].total)[0];
    const agendaStar=Object.entries(schedByPerson).filter(([n])=>n!==EMPRESA).sort((a,b)=>b[1].count-a[1].count)[0];

    // Producto estrella (por ingresos generados)
    const revenueByGroup={cadena:0,micro:0,italiana:0,gf18k:0};
    for(const q of periodQuotes){
      for(const l of(q.lines||[])){
        const grp=catToGroup[l.category]; if(!grp) continue;
        const price=(prices[l.category]?.prices[q.tier])||0;
        revenueByGroup[grp]+=(Number(l.grams)||0)*price;
      }
    }
    const productStar=Object.entries(revenueByGroup).filter(([k,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];

    // Sugerencia de compra (gramos vendidos + 15% buffer)
    const buySuggestion=Object.entries(summary.gramsByGroup)
      .filter(([k,v])=>v>0)
      .map(([k,v])=>({label:groupLabels[k]||k,sold:Math.round(v*10)/10,suggest:Math.ceil(v*1.15)}))
      .sort((a,b)=>b.sold-a.sold);

    // Días sin ventas consecutivos (desde hoy hacia atrás, solo período actual)
    let deadStreak=0;
    if(isCurrentPeriod){
      const todayStart=_dayStart(new Date());
      for(let d=0;d<60;d++){
        const dk=dayKey(todayStart.getTime()-d*864e5);
        if(activeDaySet.has(dk)) break;
        deadStreak++;
      }
    }

    return {activeDays,totalDays,projection,personStar,agendaStar,productStar,buySuggestion,deadStreak,isCurrentPeriod};
  },[periodQuotes,summary,period,activeKey,keyFn,prices]);

  const fmt$=v=>`$${fmtCLP(Math.round(v))}`;
  const delta=(curr,prev)=>prev>0?Math.round((curr-prev)/prev*100):null;
  const deltaVentas=delta(summary.totalVentas,prevVentas);
  const deltaGanancia=delta(summary.totalGanancia,prevGanancia);
  const ticketPromedio=periodQuotes.length>0?Math.round(summary.totalVentas/periodQuotes.length):0;
  const tasaConversion=totalCotizaciones>0?Math.round(periodQuotes.length/totalCotizaciones*100):null;
  const PAL=['#c9a84c','#6ee7b7','#4ade80','#38bdf8','#f472b6','#818cf8','#fb923c','#a78bfa'];
  const GCOLORS={cadena:'#a0a0a0',micro:'#38bdf8',italiana:'#4ade80',gf18k:'#c9a84c'};

  return (
    <div className="fade-in">

      {/* ── period chips ── */}
      <div className="chart-period-sel" style={{marginBottom:10}}>
        {[['daily','Diario'],['weekly','Semanal'],['monthly','Mensual'],['yearly','Anual']].map(([k,lbl])=>(
          <button key={k} className={`chart-period-btn${period===k?' active':''}`} onClick={()=>setPeriod(k)}>{lbl}</button>
        ))}
      </div>

      {/* ── nav bar ── */}
      <div className="chart-nav">
        <button className="chart-nav-btn" onClick={()=>setNavIdx(i=>Math.min(i+1,activeList.length-1))} disabled={boundedIdx>=activeList.length-1}>‹</button>
        <div className="chart-nav-center">
          <div className="chart-nav-label">{activeLabel}</div>
          {navIdx>0&&<button className="chart-nav-back" onClick={()=>setNavIdx(0)}>Volver a hoy</button>}
        </div>
        <button className="chart-nav-btn" onClick={()=>setNavIdx(i=>Math.max(i-1,0))} disabled={navIdx===0}>›</button>
      </div>

      {/* ── KPIs 3-col ── */}
      {(()=>{
        const DeltaBadge=({d})=>d===null?null:(
          <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:d>=0?'#4ade80':'var(--danger)',display:'block',marginTop:2}}>
            {d>=0?'↑':'↓'}{Math.abs(d)}% vs anterior
          </span>
        );
        return(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}}>
          <div className="chart-kpi">
            <div className="chart-kpi-label">Ventas</div>
            <div className="chart-kpi-value" style={{fontSize:11,color:'var(--gold-2)'}}>{fmt$(summary.totalVentas)}</div>
            <DeltaBadge d={deltaVentas}/>
            <div className="chart-kpi-sub">{periodQuotes.length} venta{periodQuotes.length!==1?'s':''}</div>
          </div>
          <div className="chart-kpi">
            <div className="chart-kpi-label">Ganancia</div>
            <div className="chart-kpi-value" style={{fontSize:11,color:summary.totalGanancia>=0?'var(--gold-2)':'var(--danger)'}}>{fmt$(Math.abs(Math.round(summary.totalGanancia)))}</div>
            <DeltaBadge d={deltaGanancia}/>
            <div className="chart-kpi-sub">{summary.margen}% margen</div>
          </div>
          <div className="chart-kpi">
            <div className="chart-kpi-label">Costos</div>
            <div className="chart-kpi-value" style={{fontSize:11}}>{fmt$(summary.totalCostos)}</div>
            <div className="chart-kpi-sub">Mercadería</div>
          </div>
          <div className="chart-kpi">
            <div className="chart-kpi-label">Ticket prom.</div>
            <div className="chart-kpi-value" style={{fontSize:11}}>{ticketPromedio>0?fmt$(ticketPromedio):'—'}</div>
            <div className="chart-kpi-sub">Por venta</div>
          </div>
          <div className="chart-kpi">
            <div className="chart-kpi-label">Margen</div>
            <div className="chart-kpi-value" style={{fontSize:13,color:summary.margen>=30?'var(--gold-2)':summary.margen>=15?'var(--ink)':'var(--danger)'}}>{summary.margen}%</div>
            <div className="chart-kpi-sub">Bruto neto</div>
          </div>
        </div>
        );
      })()}

      {/* ── inteligencia de negocio ── */}
      {periodQuotes.length>0&&(()=>{
        const chips=[];
        if(insights.projection) chips.push({icon:'📈',label:'Proyección del mes',value:fmt$(insights.projection),sub:'Al ritmo actual',color:'var(--gold-2)'});
        if(insights.personStar) chips.push({icon:'⭐',label:'Mayor vendedor',value:insights.personStar[0],sub:`${insights.personStar[1].count} ventas · ${fmt$(insights.personStar[1].total)}`,color:'var(--ink)'});
        if(insights.agendaStar) chips.push({icon:'📋',label:'Más agenda',value:insights.agendaStar[0],sub:`${insights.agendaStar[1].count} cita${insights.agendaStar[1].count!==1?'s':''} agendada${insights.agendaStar[1].count!==1?'s':''}`,color:'var(--ink)'});
        if(insights.productStar) chips.push({icon:'💎',label:'Producto estrella',value:{cadena:'Cadena',micro:'Micro',italiana:'Italiana',gf18k:'GF 18K'}[insights.productStar[0]]||insights.productStar[0],sub:`${fmt$(Math.round(insights.productStar[1]))} en ingresos`,color:'var(--ink)'});
        return(
        <div className="chart-card" style={{marginBottom:8}}>
          <div className="chart-head"><h3>Inteligencia <em>de negocio</em></h3><span className="eyebrow">{activeLabel}</span></div>
          <div style={{padding:'8px 12px 12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {chips.map(c=>(
              <div key={c.label} style={{background:'var(--bg-2)',borderRadius:12,padding:'11px 13px',border:'1px solid var(--line)'}}>
                <div style={{fontSize:9,fontFamily:'var(--mono)',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--ink-mute)',marginBottom:5}}>{c.icon} {c.label}</div>
                <div style={{fontSize:16,fontWeight:800,color:c.color,fontFamily:'var(--mono)',letterSpacing:'-.01em',marginBottom:3,wordBreak:'break-word'}}>{c.value}</div>
                <div style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--ink-mute)'}}>{c.sub}</div>
              </div>
            ))}
          </div>
        </div>
        );
      })()}

      {/* ── comisiones por persona ── */}
      {summary.rows.length>0&&(
        <div className="chart-card" style={{marginBottom:8}}>
          <div className="chart-head"><h3>Comisiones <em>por persona</em></h3><span className="eyebrow">{fmt$(summary.totalComisionEquipo+summary.totalEmpresa)} total</span></div>
          <div style={{padding:'4px 0 8px'}}>
            {summary.rows.map((r,i)=>{
              const tot=summary.totalComisionEquipo+summary.totalEmpresa;
              const pct=tot?Math.round(r.comision/tot*100):0;
              const color=r.name===EMPRESA?'#a0a0a0':PAL[i%PAL.length];
              const isEmpresa=r.name===EMPRESA;
              return(
              <div key={r.name} style={{padding:'10px 16px',borderBottom:'1px solid var(--line)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{width:24,height:24,borderRadius:'50%',background:`${color}22`,border:`1px solid ${color}55`,display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:8,fontWeight:800,color,flexShrink:0}}>
                      {initials(r.name)}
                    </span>
                    <span style={{fontWeight:700,fontSize:14,color:'var(--ink-dim)'}}>{r.name}</span>
                    {isEmpresa&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--ink-mute)',letterSpacing:'.1em'}}>30%</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'baseline',gap:6}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--ink-mute)'}}>{pct}%</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:14,fontWeight:700,color}}>{fmt$(r.comision)}</span>
                  </div>
                </div>
                <div style={{height:5,borderRadius:3,background:'var(--line)',overflow:'hidden',marginBottom:5}}>
                  <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:3}}/>
                </div>
                <div style={{display:'flex',gap:14,fontFamily:'var(--mono)',fontSize:10,color:'var(--ink-mute)'}}>
                  {r.agendado>0&&<span>Agendó <b style={{color:'var(--ink-dim)'}}>{fmt$(r.agendado)}</b></span>}
                  {r.atendido>0&&<span>Atendió <b style={{color:'var(--ink-dim)'}}>{fmt$(r.atendido)}</b></span>}
                  {r.empresa>0&&<span>Empresa <b style={{color:'var(--ink-dim)'}}>{fmt$(r.empresa)}</b></span>}
                </div>
              </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── ventas por persona — período activo ── */}
      {personRanking.rows.length>0&&(()=>{
        const PAL=['#c9a84c','#6ee7b7','#4ade80','#38bdf8','#f472b6','#818cf8'];
        return(
        <div className="chart-card" style={{marginBottom:8}}>
          <div className="chart-head"><h3>Ventas <em>por persona</em></h3><span className="eyebrow">{activeLabel}</span></div>
          <div style={{padding:'10px 16px 14px'}}>
            {personRanking.rows.map((r,i)=>(
              <div key={r.name} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,color:PAL[i%PAL.length]}}>{r.name}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-dim)'}}>${fmtCLP(r.total)} · {r.count} {r.count===1?'venta':'ventas'}</span>
                </div>
                <div style={{height:6,borderRadius:3,background:'var(--line)',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.round(r.total/personRanking.maxT*100)}%`,background:PAL[i%PAL.length],borderRadius:3,transition:'width .4s'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        );
      })()}

      {/* ── ranking agendadores — todos los datos ── */}
      {agendadoresRanking.rows.length>0&&(()=>{
        const PAL=['#4ade80','#38bdf8','#c9a84c','#f472b6','#a78bfa','#fb923c'];
        return(
        <div className="chart-card" style={{marginBottom:8}}>
          <div className="chart-head"><h3>Agendadores <em>ranking</em></h3><span className="eyebrow">todos los datos · por agendas</span></div>
          <div style={{padding:'10px 16px 14px'}}>
            {agendadoresRanking.rows.map((r,i)=>(
              <div key={r.name} style={{marginBottom:11}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:13,fontWeight:700,color:PAL[i%PAL.length]}}>{r.name}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:12,color:PAL[i%PAL.length],fontWeight:700}}>{r.count} <span style={{fontWeight:400,color:'var(--ink-mute)',fontSize:11}}>agendas</span></span>
                </div>
                <div style={{height:6,borderRadius:3,background:'var(--line)',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.round(r.count/agendadoresRanking.maxC*100)}%`,background:PAL[i%PAL.length],borderRadius:3,transition:'width .4s'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        );
      })()}

      {/* ── mejor día / mejor hora de ventas ── */}
      {salesPattern.topDow.length>0&&(
        <div className="chart-card" style={{marginBottom:8}}>
          <div className="chart-head"><h3>Mejor <em>día</em> de ventas</h3><span className="eyebrow">patrón histórico</span></div>
          <div style={{padding:'12px 16px 14px'}}>

              </div>

        ];
        const sorted=[...productStats].sort((a,b)=>sortCol==='name'?a.name.localeCompare(b.name):b[sortCol]-a[sortCol]);
        const fmt$=v=>`$${fmtCLP(Math.round(v))}`;
        const thStyle=(k)=>({fontFamily:'var(--mono)',fontSize:9,letterSpacing:'.12em',textTransform:'uppercase',color:sortCol===k?'var(--gold-2)':'var(--ink-mute)',padding:'8px 10px',textAlign:k==='name'?'left':'right',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap',borderBottom:'1px solid var(--line)',background:'var(--card)'});
        const tdStyle=(right,bold,color)=>({fontFamily:'var(--mono)',fontSize:12,padding:'9px 10px',textAlign:right?'right':'left',fontWeight:bold?700:500,color:color||'var(--ink-dim)',borderBottom:'1px solid var(--line)',whiteSpace:'nowrap'});

        <div className="chart-card" style={{overflow:'hidden'}}>

                    <td style={totStyle(true)}>{totRev>0?fmt$(totRev):'—'}</td>
                    <td style={totStyle(true)}>100%</td>
                  </tr>
                  );
                })()}
              </tbody>
            </table>
          </div>
        </div>
        );
      })()}

      {/* ── ventas colapsables + CSV ── */}
      <div className="chart-card">
        <div className="chart-head" style={{cursor:'pointer'}} onClick={()=>setSalesOpen(o=>!o)}>
          <h3>Ventas <em>del {periodName.toLowerCase()}</em></h3>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={e=>{e.stopPropagation();exportCSV();}} disabled={periodQuotes.length===0}

          </div>
        </div>
        {salesOpen&&(periodQuotes.length===0?(

          <SalesList quotes={periodQuotes} prices={prices}/>
        ))}
      </div>

    </div>
  );
}

// ---------- Charts Tab ----------
const CHART_PERIODS = [
  { key:'day',   label:'Diario'  },
  { key:'week',  label:'Semanal' },
  { key:'month', label:'Mensual' },
  { key:'year',  label:'Anual'   },
];

function ChartsTab({ history, prices }) {
  const [period, setPeriod] = useState('week');
  const [navOffset, setNavOffset] = useState(0);
  const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

  useEffect(()=>{ setNavOffset(0); },[period]);

  // Compute the date range + display label for the current period + offset
  const navRange = useMemo(()=>{
    const now=new Date();
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    if(period==='day'){
      const start=new Date(today.getTime()-navOffset*864e5);
      const end=new Date(start.getTime()+864e5);
      const label=navOffset===0?'Hoy':navOffset===1?'Ayer':
        start.toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'}).replace(/\./g,'');
      return {start,end,label};
    }
    if(period==='week'){
      const dow=today.getDay()||7;
      const thisMon=new Date(today.getTime()-(dow-1)*864e5);
      const start=new Date(thisMon.getTime()-navOffset*7*864e5);
      const end=new Date(start.getTime()+7*864e5);
      const sun=new Date(end.getTime()-864e5);
      const ms=start.getMonth()===sun.getMonth();
      const fmt=d=>d.toLocaleDateString('es-CL',{day:'numeric',month:'short'}).replace(/\./g,'');
      const label=ms?`${start.getDate()} – ${sun.getDate()} ${start.toLocaleDateString('es-CL',{month:'short'}).replace(/\./g,'')}`:`${fmt(start)} – ${fmt(sun)}`;
      return {start,end,label};
    }
    if(period==='month'){
      const start=new Date(now.getFullYear(),now.getMonth()-navOffset,1);
      const end=new Date(start.getFullYear(),start.getMonth()+1,1);
      const l=start.toLocaleDateString('es-CL',{month:'long',year:'numeric'});
      return {start,end,label:l.charAt(0).toUpperCase()+l.slice(1)};
    }
    const y=now.getFullYear()-navOffset;
    return {start:new Date(y,0,1),end:new Date(y+1,0,1),label:String(y)};
  },[period,navOffset]);

  const timeData = useMemo(()=>{
    const {start,end}=navRange;
    const buckets=[];
    if(period==='day'){
      for(let h=0;h<24;h+=2){
        const s=start.getTime()+h*3600000;
        buckets.push({key:String(h),label:`${String(h).padStart(2,'0')}h`,start:s,end:s+7200000,total:0,ganancia:0,count:0});
      }
    }else if(period==='week'){
      const DAYS=['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
      for(let d=0;d<7;d++){
        const s=start.getTime()+d*864e5;
        buckets.push({key:String(d),label:DAYS[d],start:s,end:s+864e5,total:0,ganancia:0,count:0});
      }
    }else if(period==='month'){
      const cur=new Date(start),endMs=end.getTime();
      while(cur.getTime()<endMs){
        const s=cur.getTime();
        const e=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1).getTime();
        buckets.push({key:String(cur.getDate()),label:String(cur.getDate()),start:s,end:e,total:0,ganancia:0,count:0});
        cur.setDate(cur.getDate()+1);
      }
    }else{
      const MONTHS=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
      const y=start.getFullYear();
      for(let m=0;m<12;m++){
        const s=new Date(y,m,1).getTime(),e=new Date(y,m+1,1).getTime();
        buckets.push({key:String(m),label:MONTHS[m],start:s,end:e,total:0,ganancia:0,count:0});
      }
    }
    for(const q of history){
      if(!q.concretada) continue;
      const at=q.at;
      for(const b of buckets){
        if(at>=b.start&&at<b.end){
          b.total+=Number(q.total)||0;
          b.ganancia+=quoteCostAndProfit(q,prices).profit;
          b.count++;break;
        }
      }
    }
    return buckets;
  },[navRange,period,history,prices]);

  const visibleSales = useMemo(()=>{
    const startMs=navRange.start.getTime(),endMs=navRange.end.getTime();
    return history.filter(q=>q.concretada&&q.at>=startMs&&q.at<endMs);
  },[navRange,history]);

  // Patrón histórico sobre TODOS los datos
  const personData = useMemo(()=>{
    const totals={};
    const inc=(name,field,val)=>{ if(!totals[name]) totals[name]={agendado:0,atendido:0,empresa:0}; totals[name][field]+=val; };
    for(const q of visibleSales){
      const base=Math.max(0,quoteCostAndProfit(q,prices).profit);
      const sched=normName((q.scheduler||'').trim()||EMPRESA),att=normName((q.attendant||'').trim()||EMPRESA);
      inc(sched,'agendado', base*PCT_SCHEDULER);
      inc(att,  'atendido', base*PCT_ATTENDANT);
      inc(EMPRESA,'empresa', base*PCT_EMPRESA);
    }
    return Object.entries(totals)
      .map(([name,v])=>({name,agendado:Math.round(v.agendado),atendido:Math.round(v.atendido),empresa:Math.round(v.empresa||0),value:Math.round(v.agendado+v.atendido+(v.empresa||0))}))
      .filter(x=>x.value>0).sort((a,b)=>b.value-a.value);
  },[visibleSales,prices]);

  const gramsData = useMemo(()=>{
    const CAT_TO_GROUP={
      collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',
      collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',
      italiana_925:'italiana',gf_18k:'gf18k',
    };
    const GROUPS={cadena:{name:'Cadena 🔗',g:0},micro:{name:'Micro 💎',g:0},italiana:{name:'Italiana 🇮🇹',g:0},gf18k:{name:'GF 18K ☀️',g:0}};
    for(const q of visibleSales){
      for(const l of(q.lines||[])){
        if(l.category===INSUMO_KEY) continue;
        if(l.category===LOTE_KEY){
          const gm=l.loteGramsMap||{};
          for(const k of['cadena','micro','italiana','gf18k']) if(GROUPS[k]) GROUPS[k].g+=(Number(gm[k])||0);
        } else {
          const grp=CAT_TO_GROUP[l.category];
          if(grp) GROUPS[grp].g+=Number(l.grams)||0;
        }
      }
    }
    return Object.entries(GROUPS).map(([key,{name,g}])=>({key,name,grams:Math.round(g*10)/10})).filter(x=>x.grams>0).sort((a,b)=>b.grams-a.grams);
  },[visibleSales]);

  // KPIs desde visibleSales — se actualiza con focusKey
  const kpis = useMemo(()=>{
    let ventas=0,ganancia=0,count=0;
    for(const q of visibleSales){
      ventas+=Number(q.total)||0;
      ganancia+=quoteCostAndProfit(q,prices).profit;
      count++;
    }
    const margen=ventas>0?Math.round(ganancia/ventas*100):0;
    return {ventas,count,ganancia,margen};
  },[visibleSales,prices]);

  // Tendencia mensual — últimos 12 meses
  const trendData = useMemo(()=>{
    const now=new Date();
    const months=Array(12).fill(0).map((_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
      return {key:monthKey(d.getTime()),label:d.toLocaleDateString('es-CL',{month:'short'}).replace('.',''),total:0,ganancia:0};
    });
    for(const q of history){
      if(!q.concretada) continue;
      const m=months.find(m=>m.key===monthKey(q.at));
      if(m){m.total+=Number(q.total)||0;m.ganancia+=quoteCostAndProfit(q,prices).profit;}
    }
    return months;
  },[history,prices]);

  // Vendedores — todos los datos históricos
  const vendedoresMonthly = useMemo(()=>{
    const now=new Date();
    const months=Array(6).fill(0).map((_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);return{key:monthKey(d.getTime()),label:d.toLocaleDateString('es-CL',{month:'short'}).replace('.','')}; });
    const byP={};
    for(const q of history){
      if(!q.concretada) continue;
      const mIdx=months.findIndex(m=>m.key===monthKey(q.at)); if(mIdx<0) continue;
      const k=normName((q.attendant||'').trim()||EMPRESA);
      if(!byP[k]) byP[k]={name:k,vals:Array(6).fill(0)};
      byP[k].vals[mIdx]+=Number(q.total)||0;
    }
    const PAL=['#c9a84c','#6ee7b7','#38bdf8','#f472b6','#a78bfa','#fb923c'];
    const series=Object.values(byP).sort((a,b)=>b.vals.reduce((s,v)=>s+v,0)-a.vals.reduce((s,v)=>s+v,0)).slice(0,6).map((p,i)=>({...p,color:PAL[i%PAL.length]}));
    return {labels:months.map(m=>m.label),series};
  },[history]);

  const agendadoresMonthly = useMemo(()=>{
    const now=new Date();
    const months=Array(6).fill(0).map((_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);return{key:monthKey(d.getTime()),label:d.toLocaleDateString('es-CL',{month:'short'}).replace('.','')}; });
    const byP={};
    for(const q of history){
      if(!q.concretada) continue;
      const mIdx=months.findIndex(m=>m.key===monthKey(q.at)); if(mIdx<0) continue;
      const k=normName((q.scheduler||'').trim()||EMPRESA);
      if(!byP[k]) byP[k]={name:k,vals:Array(6).fill(0)};
      byP[k].vals[mIdx]++;
    }
    const PAL=['#4ade80','#38bdf8','#c9a84c','#f472b6','#a78bfa','#fb923c'];
    const series=Object.values(byP).sort((a,b)=>b.vals.reduce((s,v)=>s+v,0)-a.vals.reduce((s,v)=>s+v,0)).slice(0,6).map((p,i)=>({...p,color:PAL[i%PAL.length]}));
    return {labels:months.map(m=>m.label),series};
  },[history]);

  // Mix de ingresos por categoría — últimos 6 meses
  const mixData = useMemo(()=>{
    const catToGroup={collar_pulsera_mujer_925:'cadena',collar_pulsera_hombre_925:'cadena',collar_pulsera_micro:'micro',aros_colgantes_925:'micro',anillos_925:'micro',italiana_925:'italiana',gf_18k:'gf18k'};
    const now=new Date();
    const months=Array(6).fill(0).map((_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
      return {key:monthKey(d.getTime()),label:d.toLocaleDateString('es-CL',{month:'short'}).replace('.',''),cadena:0,micro:0,italiana:0,gf18k:0,total:0};
    });
    for(const q of history){
      if(!q.concretada) continue;
      const m=months.find(m=>m.key===monthKey(q.at)); if(!m) continue;
      for(const l of(q.lines||[])){
        const grp=catToGroup[l.category]; if(!grp) continue;
        const price=(prices[l.category]?.prices[q.tier])||0;
        const rev=(Number(l.grams)||0)*price;
        m[grp]+=rev; m.total+=rev;
      }
    }
    return months;
  },[history,prices]);

  const salesRef=useRef(null);
  const trendRef=useRef(null);
  const mixRef=useRef(null);
  const vendRef=useRef(null);
  const agendRef=useRef(null);

  useEffect(()=>{
    const canvas=salesRef.current; if(!canvas) return;
    const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth,H=220;
    canvas.width=W*dpr;canvas.height=H*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    const gold2=getCssVar('--gold-2'),lineC=getCssVar('--line'),inkMute=getCssVar('--ink-mute');
    ctx.clearRect(0,0,W,H);
    const pad={top:20,right:16,bottom:44,left:16},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
    const n=timeData.length; if(!n) return;
    const maxVal=Math.max(...timeData.map(d=>d.total),1);
    ctx.strokeStyle=lineC;ctx.lineWidth=0.5;
    [0,.25,.5,.75,1].forEach(t=>{const y=pad.top+cH*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();});
    const pt=(i,v)=>({x:pad.left+(n<2?cW/2:i/(n-1)*cW),y:pad.top+cH*(1-Math.max(0,v)/maxVal)});
    const drawSeriesLine=(vals,color,lw,fill)=>{
      const pts=vals.map((v,i)=>pt(i,v));
      if(fill){
        const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
        grad.addColorStop(0,color+'33');grad.addColorStop(1,color+'00');
        ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+cH);ctx.lineTo(pts[0].x,pts[0].y);
        for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
        ctx.lineTo(pts[pts.length-1].x,pad.top+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      }
      ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.stroke();
      pts.forEach((p,i)=>{if(vals[i]>0){ctx.fillStyle=color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}});
    };
    drawSeriesLine(timeData.map(d=>d.total),gold2,2,true);
    drawSeriesLine(timeData.map(d=>Math.max(0,d.ganancia)),'#4ade80',1.5,false);
    timeData.forEach((d,i)=>{
      const showLabel=n<=14||i%Math.ceil(n/14)===0||i===n-1;
      if(showLabel){const x=pad.left+(n<2?cW/2:i/(n-1)*cW);ctx.fillStyle=inkMute;ctx.font=`500 8px 'Montserrat',sans-serif`;ctx.textAlign='center';ctx.fillText(d.label.toUpperCase(),x,H-6);}
    });
    const ly=H-16;ctx.font=`500 8px 'Montserrat',sans-serif`;
    ctx.fillStyle=gold2;ctx.fillRect(pad.left,ly-7,10,7);ctx.fillStyle=inkMute;ctx.textAlign='left';ctx.fillText('Venta',pad.left+13,ly);
    ctx.fillStyle='#4ade80';ctx.fillRect(pad.left+55,ly-7,10,7);ctx.fillStyle=inkMute;ctx.fillText('Ganancia',pad.left+68,ly);
  },[timeData]);

  useEffect(()=>{
    const canvas=mixRef.current; if(!canvas) return;
    const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth,H=160;
    canvas.width=W*dpr;canvas.height=H*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    const lineC=getCssVar('--line'),inkMute=getCssVar('--ink-mute');
    ctx.clearRect(0,0,W,H);
    const pad={top:16,right:16,bottom:30,left:16},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
    const n=mixData.length; if(!n) return;
    const SERIES=[{k:'cadena',color:'#c9a84c'},{k:'micro',color:'#38bdf8'},{k:'italiana',color:'#4ade80'},{k:'gf18k',color:'#a78bfa'}];
    const allVals=mixData.flatMap(m=>SERIES.map(s=>m[s.k]||0));
    const maxVal=Math.max(...allVals,1);
    ctx.strokeStyle=lineC;ctx.lineWidth=0.5;
    [0,0.5,1].forEach(t=>{const y=pad.top+cH*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();});
    const pt=(i,v)=>({x:pad.left+(n<2?cW/2:i/(n-1)*cW),y:pad.top+cH*(1-Math.max(0,v)/maxVal)});
    SERIES.forEach(({k,color})=>{
      const vals=mixData.map(m=>m[k]||0);
      if(!vals.some(v=>v>0)) return;
      const pts=vals.map((v,i)=>pt(i,v));
      const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
      grad.addColorStop(0,color+'22');grad.addColorStop(1,color+'00');
      ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+cH);ctx.lineTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.lineTo(pts[pts.length-1].x,pad.top+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.stroke();
      pts.forEach((p,i)=>{if(vals[i]>0){ctx.fillStyle=color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}});
    });
    mixData.forEach((m,i)=>{
      const x=pad.left+(n<2?cW/2:i/(n-1)*cW);
      ctx.fillStyle=inkMute;ctx.font=`500 7px 'Montserrat',sans-serif`;ctx.textAlign='center';ctx.fillText(m.label.toUpperCase(),x,H-4);
    });
  },[mixData]);

  const drawMultiLine=(canvas,H,data,labelFn)=>{
    if(!canvas||!data.series.length) return;
    const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth;
    canvas.width=W*dpr;canvas.height=H*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    const lineC=getCssVar('--line'),inkMute=getCssVar('--ink-mute');
    ctx.clearRect(0,0,W,H);
    const legH=data.series.length>3?28:18;
    const pad={top:14,right:16,bottom:20+legH,left:16},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
    const n=data.labels.length; if(!n) return;
    const allVals=data.series.flatMap(s=>s.vals);
    const maxVal=Math.max(...allVals,1);
    ctx.strokeStyle=lineC;ctx.lineWidth=0.5;
    [0,0.5,1].forEach(t=>{const y=pad.top+cH*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();});
    const pt=(i,v)=>({x:pad.left+(n<2?cW/2:i/(n-1)*cW),y:pad.top+cH*(1-Math.max(0,v)/maxVal)});
    data.series.forEach(({vals,color})=>{
      const pts=vals.map((v,i)=>pt(i,v));
      const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
      grad.addColorStop(0,color+'1a');grad.addColorStop(1,color+'00');
      ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+cH);ctx.lineTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.lineTo(pts[pts.length-1].x,pad.top+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.stroke();
      pts.forEach((p,i)=>{if(vals[i]>0){ctx.fillStyle=color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();}});
    });
    data.labels.forEach((lbl,i)=>{
      const x=pad.left+(n<2?cW/2:i/(n-1)*cW);
      ctx.fillStyle=inkMute;ctx.font=`500 7px 'Montserrat',sans-serif`;ctx.textAlign='center';ctx.fillText(lbl.toUpperCase(),x,pad.top+cH+14);
    });
    // legend
    const cols=data.series.length>3?2:1;
    const perCol=Math.ceil(data.series.length/cols);
    const colW=cW/cols;
    data.series.forEach(({name,color},i)=>{
      const col=Math.floor(i/perCol),row=i%perCol;
      const lx=pad.left+col*colW,ly=pad.top+cH+20+row*12;
      ctx.fillStyle=color;ctx.beginPath();ctx.arc(lx+4,ly-4,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=inkMute;ctx.font=`500 8px 'Montserrat',sans-serif`;ctx.textAlign='left';
      const label=labelFn?labelFn(name,i):name;
      ctx.fillText(label,lx+10,ly);
    });
  };

  useEffect(()=>{ drawMultiLine(vendRef.current,180,vendedoresMonthly,null); },[vendedoresMonthly]);
  useEffect(()=>{ drawMultiLine(agendRef.current,160,agendadoresMonthly,null); },[agendadoresMonthly]);

  useEffect(()=>{
    const canvas=trendRef.current; if(!canvas) return;
    const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth,H=160;
    canvas.width=W*dpr; canvas.height=H*dpr;
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    const gold2=getCssVar('--gold-2'),inkMute=getCssVar('--ink-mute'),lineC=getCssVar('--line');
    ctx.clearRect(0,0,W,H);
    const data=trendData.filter(d=>d.total>0);
    const all=trendData;
    const n=all.length; if(!n) return;
    const maxVal=Math.max(...all.map(d=>d.total),1);
    const pad={top:16,right:10,bottom:22,left:10};
    const cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom;
    ctx.strokeStyle=lineC; ctx.lineWidth=0.5;
    [0,0.5,1].forEach(t=>{const y=pad.top+cH*(1-t);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();});
    const pt=(i,v)=>({x:pad.left+(n<2?cW/2:i/(n-1)*cW),y:pad.top+cH*(1-Math.max(0,v)/maxVal)});
    const drawLine=(vals,color,lw,fill)=>{
      const pts=vals.map((v,i)=>pt(i,v));
      if(fill){
        const grad=ctx.createLinearGradient(0,pad.top,0,pad.top+cH);
        grad.addColorStop(0,color+'33'); grad.addColorStop(1,color+'00');
        ctx.beginPath();
        ctx.moveTo(pts[0].x,pad.top+cH);
        ctx.lineTo(pts[0].x,pts[0].y);
        for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
        ctx.lineTo(pts[pts.length-1].x,pad.top+cH); ctx.closePath();
        ctx.fillStyle=grad; ctx.fill();
      }
      ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++){const cpx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cpx,pts[i-1].y,cpx,pts[i].y,pts[i].x,pts[i].y);}
      ctx.stroke();
      // dot on peak
      const peakI=vals.indexOf(Math.max(...vals));
      if(peakI>=0&&vals[peakI]>0){ctx.fillStyle=color;ctx.beginPath();ctx.arc(pts[peakI].x,pts[peakI].y,3,0,Math.PI*2);ctx.fill();}
    };
    drawLine(all.map(d=>d.total),gold2,2,true);
    drawLine(all.map(d=>Math.max(0,d.ganancia)),'#4ade80',1.5,false);
    all.forEach((d,i)=>{
      if(i%2===0||i===n-1){ctx.fillStyle=inkMute;ctx.font=`500 7px 'Montserrat',sans-serif`;ctx.textAlign='center';const x=pad.left+(n<2?cW/2:i/(n-1)*cW);ctx.fillText(d.label.toUpperCase(),x,H-4);}
    });
    const ly=H-14; ctx.font=`500 7px 'Montserrat',sans-serif`;
    ctx.fillStyle=gold2;ctx.fillRect(pad.left,ly-6,8,6);ctx.fillStyle=inkMute;ctx.textAlign='left';ctx.fillText('Venta',pad.left+11,ly);
    ctx.fillStyle='#4ade80';ctx.fillRect(pad.left+48,ly-6,8,6);ctx.fillStyle=inkMute;ctx.fillText('Ganancia',pad.left+59,ly);
  },[trendData]);

  const hasData=history.some(q=>q.concretada);
  return (
    <div className="fade-in">
      {/* ── period chips ── */}
      <div className="chart-period-sel" style={{marginBottom:10}}>
        {CHART_PERIODS.map(p=>(
          <button key={p.key} className={`chart-period-btn${period===p.key?' active':''}`} onClick={()=>setPeriod(p.key)}>{p.label}</button>
        ))}
      </div>
      {/* ── nav bar: arrows + label + volver ── */}
      <div className="chart-nav">
        <button className="chart-nav-btn" onClick={()=>setNavOffset(o=>o+1)}>‹</button>
        <div className="chart-nav-center">
          <div className="chart-nav-label">{navRange.label}</div>
          {navOffset>0&&<button className="chart-nav-back" onClick={()=>setNavOffset(0)}>Volver a hoy</button>}
        </div>
        <button className="chart-nav-btn" onClick={()=>setNavOffset(o=>Math.max(0,o-1))} disabled={navOffset===0}>›</button>
      </div>
      {!hasData?(
        <div className="card"><div className="chart-empty"><div style={{fontSize:36,marginBottom:12}}>📊</div><p style={{margin:0,color:'var(--ink-dim)',fontWeight:600}}>Sin datos todavía</p><p style={{margin:'6px 0 0',fontSize:12,color:'var(--ink-mute)'}}>Confirma ventas desde Historial para ver tus gráficos</p></div></div>
      ):(
        <div className="charts-grid">
          <div className="chart-kpi-row">
            <div className="chart-kpi"><div className="chart-kpi-label">Ventas</div><div className="chart-kpi-value" style={{fontSize:12}}>${fmtCLP(kpis.ventas)}</div><div className="chart-kpi-sub">{kpis.count} venta{kpis.count!==1?'s':''}</div></div>
            <div className="chart-kpi"><div className="chart-kpi-label">Ganancia</div><div className="chart-kpi-value" style={{fontSize:12,color:kpis.ganancia>=0?'var(--gold-2)':'var(--danger)'}}>${fmtCLP(Math.abs(Math.round(kpis.ganancia)))}</div><div className="chart-kpi-sub">Neta</div></div>
            <div className="chart-kpi"><div className="chart-kpi-label">Margen</div><div className="chart-kpi-value" style={{fontSize:13,color:kpis.margen>=30?'var(--gold-2)':kpis.margen>=15?'var(--ink)':'var(--danger)'}}>{kpis.margen}%</div><div className="chart-kpi-sub">Bruto</div></div>
          </div>
          <div className="chart-card">
            <div className="chart-head">
              <h3>Venta <em>vs</em> Ganancia</h3>
              <span className="eyebrow">{kpis.count} venta{kpis.count!==1?'s':''} · ${fmtCLP(kpis.ventas)}</span>
            </div>
            <div className="chart-body">
              <div className="chart-canvas-wrap">
                <canvas ref={salesRef} style={{height:220}}/>
              </div>
            </div>
          </div>
          {/* ── mix de ingresos por categoría (últimos 6 meses) ── */}
          {mixData.some(m=>m.total>0)&&(()=>{
            const MCOLORS={cadena:'#c9a84c',micro:'#38bdf8',italiana:'#4ade80',gf18k:'#a78bfa'};
            return(
            <div className="chart-card">
              <div className="chart-head"><h3>Mix <em>de ingresos</em></h3><span className="eyebrow">últimos 6 meses</span></div>
              <div className="chart-body" style={{padding:'4px 0 0'}}>
                <div className="chart-canvas-wrap">
                  <canvas ref={mixRef} style={{height:160}}/>
                </div>
              </div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',padding:'0 16px 14px'}}>
                {Object.entries(MCOLORS).map(([k,c])=>(
                  <div key={k} style={{display:'flex',alignItems:'center',gap:5}}>
                    <div style={{width:8,height:8,borderRadius:2,background:c}}/>
                    <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--ink-mute)',textTransform:'capitalize'}}>{k==='gf18k'?'GF 18K':k.charAt(0).toUpperCase()+k.slice(1)}</span>
                  </div>
                ))}
              </div>
            </div>
            );
          })()}

          {/* ── línea de tendencia mensual ── */}
          {trendData.some(d=>d.total>0)&&(
            <div className="chart-card">
              <div className="chart-head"><h3>Tendencia <em>mensual</em></h3><span className="eyebrow">últimos 12 meses</span></div>
              <div className="chart-body" style={{padding:'4px 0 0'}}>
                <div className="chart-canvas-wrap">
                  <canvas ref={trendRef} style={{height:160}}/>
                </div>
              </div>
            </div>
          )}

          {/* ── cantidad de ventas por período ── */}
          {timeData.some(d=>d.count>0)&&(()=>{
            const maxC=Math.max(...timeData.map(d=>d.count),1);
            const PAL=['#38bdf8'];
            return(
            <div className="chart-card">
              <div className="chart-head"><h3>Cantidad <em>de ventas</em></h3><span className="eyebrow">{navRange.label}</span></div>
              <div style={{padding:'12px 16px 10px'}}>
                <div style={{display:'flex',gap:3,alignItems:'flex-end',height:90,marginBottom:8}}>
                  {timeData.map((d,i)=>{
                    const h=d.count>0?Math.max(8,Math.round(d.count/maxC*80)):0;
                    return(
                    <div key={d.key} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',gap:2}}>
                      {d.count>0&&<span style={{fontFamily:'var(--mono)',fontSize:7,color:'var(--ink-mute)',fontWeight:700}}>{d.count}</span>}
                      <div style={{width:'100%',height:`${h}px`,background:'#38bdf8',borderRadius:'3px 3px 0 0',minHeight:d.count>0?4:0,transition:'height .3s'}}/>
                    </div>
                    );
                  })}
                </div>
                <div style={{display:'flex',gap:3}}>
                  {timeData.map((d,i)=>{
                    const n=timeData.length,show=n<=14||i%Math.ceil(n/14)===0||i===n-1;
                    return(
                    <div key={d.key} style={{flex:1,fontFamily:'var(--mono)',fontSize:7,textAlign:'center',color:'var(--ink-mute)',textTransform:'uppercase',overflow:'hidden',opacity:show?1:0}}>
                      {show?d.label:''}
                    </div>
                    );
                  })}
                </div>
              </div>
            </div>
            );
          })()}

          {/* ── rendimiento vendedores — líneas mensuales ── */}
          {vendedoresMonthly.series.length>0&&(
            <div className="chart-card">
              <div className="chart-head"><h3>Rendimiento <em>vendedores</em></h3><span className="eyebrow">últimos 6 meses</span></div>
              <div className="chart-body" style={{padding:'4px 0 0'}}>
                <div className="chart-canvas-wrap">
                  <canvas ref={vendRef} style={{height:180}}/>
                </div>
              </div>
            </div>
          )}

          {/* ── actividad agendadores — líneas mensuales ── */}
          {agendadoresMonthly.series.length>0&&(
            <div className="chart-card">
              <div className="chart-head"><h3>Actividad <em>agendadores</em></h3><span className="eyebrow">últimos 6 meses</span></div>
              <div className="chart-body" style={{padding:'4px 0 0'}}>
                <div className="chart-canvas-wrap">
                  <canvas ref={agendRef} style={{height:160}}/>
                </div>
              </div>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function App(){
  const [fbUser, setFbUser]           = useState(undefined); // undefined=cargando, null=no authed
  const [userProfile, setUserProfile] = useState(null);
  const isAdmin = userProfile?.role === 'admin' || fbUser?.email === window.__FB?.ADMIN_EMAIL;
  const [adminOpen, setAdminOpen]     = useState(false);

  // Escuchar estado de auth Firebase
  useEffect(() => {
    if (!window.__FB) return;
    const unsub = window.__FB.onAuthStateChanged(async (user) => {
      setFbUser(user);
      if (user) {
        let profile = await window.__FB.getUserProfile(user.uid);
        if (!profile) {
          profile = { uid: user.uid, email: user.email, name: user.email.split('@')[0],
            role: user.email === window.__FB.ADMIN_EMAIL ? 'admin' : 'user', createdAt: Date.now() };
          await window.__FB.saveUserProfile(user.uid, profile);
        }
        setUserProfile(profile);
      } else {
        setUserProfile(null);
      }
    });
    return () => unsub();
  }, []);

  const [tab, setTab] = useState(() => localStorage.getItem(LS_TAB) || 'calc');
  const [prices, setPrices] = useState(() => {
    try {
      const s = localStorage.getItem(LS_PRICES);
      if (s) {
        const stored = JSON.parse(s);
        const merged = {};
        for (const k of Object.keys(stored)) {
          merged[k] = { ...stored[k] };
          if (DEFAULT_PRICES[k]) {
            merged[k].cost        = DEFAULT_PRICES[k].cost;
            merged[k].costKilero  = DEFAULT_PRICES[k].costKilero;
            merged[k].prices      = [...DEFAULT_PRICES[k].prices];
            merged[k].name        = DEFAULT_PRICES[k].name;
            merged[k].material    = DEFAULT_PRICES[k].material;
          }
        }
        for (const k of Object.keys(DEFAULT_PRICES)) {
          if (!merged[k]) merged[k] = { ...DEFAULT_PRICES[k] };
        }
        return merged;
      }
    } catch(e){}
    return DEFAULT_PRICES;
  });

  // Historia desde Firestore (tiempo real)
  const [history, setHistory]           = useState([]);
  const [historyLoading, setHistoryLoading] = useState(false);

  useEffect(() => {
    if (!fbUser || !window.__FB) return;
    setHistoryLoading(true);
    let unsub;
    if (isAdmin) {
      unsub = window.__FB.listenAllQuotes(quotes => { setHistory(quotes); setHistoryLoading(false); });
    } else {
      unsub = window.__FB.listenMyQuotes(fbUser.uid, quotes => { setHistory(quotes); setHistoryLoading(false); });
    }
    return () => unsub && unsub();
  }, [fbUser?.uid, isAdmin]);

  const [clientName, setClientName] = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.clientName || ""; } catch { return ""; } });
  const [scheduler, setScheduler]   = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.scheduler || ""; } catch { return ""; } });
  const [attendant, setAttendant]   = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.attendant || ""; } catch { return ""; } });
  const [pago, setPago]             = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.pago || localStorage.getItem(LS_PAGO) || ""; } catch { return localStorage.getItem(LS_PAGO) || ""; } });
  const [concretada, setConcretada] = useState(false);
  const [lines, setLines]           = useState(() => { try { const d = JSON.parse(localStorage.getItem(LS_DRAFT)); return d?.lines?.length ? d.lines : [{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]; } catch { return [{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]; } });
  const [customTotal, setCustomTotal] = useState("");

  const [toast, setToast]   = useState("");
  const toastTimer           = useRef(null);
  const showToast            = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }, []);

  // Tweaks (modo edición por postMessage)
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persistencia local (precios, tab, pago, borrador calculadora)
  useEffect(() => { localStorage.setItem(LS_TAB,    tab);                     }, [tab]);
  useEffect(() => { localStorage.setItem(LS_PRICES, JSON.stringify(prices));  }, [prices]);
  useEffect(() => { localStorage.setItem(LS_PAGO,   pago);                    }, [pago]);
  useEffect(() => {
    localStorage.setItem(LS_DRAFT, JSON.stringify({ clientName, scheduler, attendant, pago, lines }));
  }, [clientName, scheduler, attendant, pago, lines]);

  // Tema
  const [theme, setTheme]           = useState(() => localStorage.getItem(LS_THEME) || 'dark');
  const [customTheme, setCustomTheme] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_CUSTOM_THEME)) || DEFAULT_CUSTOM; }
    catch(e) { return DEFAULT_CUSTOM; }
  });
  const [themeOpen, setThemeOpen] = useState(false);
  useEffect(() => { applyTheme(theme, customTheme); localStorage.setItem(LS_THEME, theme); }, [theme, customTheme]);
  useEffect(() => { localStorage.setItem(LS_CUSTOM_THEME, JSON.stringify(customTheme)); }, [customTheme]);

  const logout = async () => {
    await window.__FB.signOut();
    setFbUser(null); setUserProfile(null);
  };

  const totals    = useMemo(() => computeTotals(lines, prices), [lines, prices]);
  const addLine   = () => setLines(ls => [...ls, { id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
  const removeLine = (id) => setLines(ls => ls.length > 1 ? ls.filter(l => l.id !== id) : ls);
  const updateLine = (id, patch) => setLines(ls => ls.map(l => l.id === id ? { ...l, ...patch } : l));


  const resetCalc = () => {
    setLines([{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
    setClientName(""); setScheduler(""); setAttendant(""); setConcretada(false);
    setCustomTotal("");
    localStorage.removeItem(LS_DRAFT);
  };

  const isValidLine = (l) => {
    if (l.category === INSUMO_KEY) return Number(l.insumoCost) > 0 || !!(l.insumoName && l.insumoName.trim());
    if (l.category === LOTE_KEY)   return Number(l.lotePrice) > 0;
    if (l.isGift)                  return Number(l.grams) > 0;
    return Number(l.grams) > 0 && Number(l.customPrice) > 0;
  };
  const hasValidLines = lines.some(isValidLine);

  const copyMessage = async () => {
    const validLines = lines.filter(isValidLine);
    if (validLines.length === 0) return;
    const piezas = buildMessagePiezas(validLines, prices);
    const ventaTotal = customTotal !== "" ? (Number(customTotal.toString().replace(/\D/g,"")) || totals.total) : totals.total;
    const msg = `Nombre Cliente : ${clientName.trim()}
Pago: ${pago}
Atencion : ${attendant}
Agenda : ${scheduler}

${piezas}

Venta: $${fmtCLP(ventaTotal)}${totals.tier === 4 ? '\n(Precio Kilero)' : ''}`;
    try {
      if (navigator.share) {
        await navigator.share({ text: msg });
        showToast("¡Mensaje enviado!");
      } else {
        await navigator.clipboard.writeText(msg); showToast("¡Mensaje copiado!");
      }
    } catch (e) {
      if (e?.name === 'AbortError') return;
      const ta = document.createElement('textarea');
      ta.value = msg; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast("¡Mensaje copiado!"); } catch(_){ showToast("No se pudo copiar"); }
      document.body.removeChild(ta);
    }
  };

  const saveQuote = async () => {
    const validLines = lines.filter(isValidLine);
    if (validLines.length === 0) { showToast("Agrega al menos una línea"); return; }
    const costsSnap = {};
    let totalCost = 0;
    const kilero = isKileroTier(totals.tier);
    for (const l of validLines) {
      if (l.category === INSUMO_KEY) {
        const cost = Number(l.insumoCost) || 0;
        const qty  = 1;
        totalCost += cost * qty; continue;
      }
      if (l.category === LOTE_KEY) {
        // El costo del lote se calcula por gramaje × costo de cada categoría
        const gramsMap = l.loteGramsMap || {};
        let loteCost = 0;
        for (const [typeKey, catKey] of Object.entries(LOTE_CAT_MAP)) {
          const g = Number(gramsMap[typeKey]) || 0;
          if (g > 0) {
            const c = effectiveCost(prices[catKey], totals.tier);
            loteCost += c * g;
          }
        }
        totalCost += loteCost;
        continue;
      }
      const g = Number(l.grams) || 0;
      const c = effectiveCost(prices[l.category], totals.tier);
      costsSnap[l.category] = c;
      totalCost += c * g;
    }
    const savedTotal = customTotal !== "" ? (Number(customTotal.toString().replace(/\D/g,"")) || totals.total) : totals.total;
    const profit = savedTotal - totalCost;
    const entry = {
      id: uid(), at: Date.now(),
      client: clientName.trim(), pago, scheduler, attendant,
      concretada: true,
      userId:   fbUser.uid,
      userName: userProfile?.name || fbUser.email,
      lines: validLines.map(l => {
        if (l.category === INSUMO_KEY) {
          const cost  = Number(l.insumoCost) || 0;
          // Si insumoValor fue ingresado (incluso como 0 = regalo), respetarlo; si no, usar cost
          const valor = (l.insumoValor !== '' && l.insumoValor !== undefined && l.insumoValor !== null)
            ? Number(l.insumoValor)
            : cost;
          const qty   = 1;
          return { category: INSUMO_KEY, insumoName: l.insumoName || 'Insumo', insumoCost: cost, insumoValor: valor, insumoQty: qty, insumoPrice: valor, grams: 0, isGift: !!l.isGift };
        }
        if (l.category === LOTE_KEY) {
          const gramsMap    = l.loteGramsMap || {};
          const totalGrams  = Object.values(gramsMap).reduce((s,v) => s+(Number(v)||0), 0);
          return { category: LOTE_KEY, loteName: l.loteName || '', loteGramsMap: gramsMap, lotePrice: Number(l.lotePrice) || 0, grams: totalGrams };
        }
        return { category: l.category, grams: Number(l.grams), customPrice: Number(l.customPrice) || 0, isGift: !!l.isGift };
      }),
      tier: totals.tier, total: savedTotal, totalWeight: totals.totalWeight,
      pago, kilero, costsSnap, totalCost, profit,
    };
    try {
      // Limpiar undefined antes de guardar en Firestore
      const cleanEntry = JSON.parse(JSON.stringify(entry, (k, v) => v === undefined ? null : v));
      await window.__FB.saveQuote(fbUser.uid, cleanEntry);
      resetCalc();
      showToast("Cotización guardada ☁️");
    } catch(e) { showToast("Error al guardar: " + e.message); }
  };

  const loadQuote = (q) => {
    setClientName(q.client || ""); setScheduler(normName(q.scheduler || "")); setAttendant(normName(q.attendant || "")); setConcretada(!!q.concretada);
    setLines(q.lines.map(l => ({
      id: uid(), category: l.category,
      grams:      (l.category === INSUMO_KEY || l.category === LOTE_KEY) ? '' : String(l.grams),
      insumoName: l.insumoName  || '',
      insumoCost: l.insumoCost  ? String(l.insumoCost)  : (l.insumoPrice ? String(l.insumoPrice) : ''),
      insumoValor: l.insumoValor ? String(l.insumoValor) : '',
      insumoQty:  '1',
      loteName:   l.loteName    || '',
      loteGramsMap: l.loteGramsMap || {},
      lotePrice:  l.lotePrice   ? String(l.lotePrice)   : '',
      customPrice: l.customPrice ? String(l.customPrice) : '',
      isGift: !!l.isGift
    })));
    setTab('calc');
    showToast("Cotización cargada");
  };

  const toggleConcretada = async (id) => {
    const quote = history.find(q => q.id === id);
    if (!quote) return;
    if (!quote.concretada) {
      if (!confirm(`¿Confirmar venta${quote.client ? ' de ' + quote.client : ''} por $${fmtCLP(quote.total)}?\n\nSe agregará a los reportes de ventas.`)) return;
      await window.__FB.updateQuote(id, { concretada: true });
      showToast("✅ Venta confirmada · Agregada a reportes");
    } else {
      if (!confirm('¿Quitar la confirmación de esta venta?\n\nSe eliminará de los reportes.')) return;
      await window.__FB.updateQuote(id, { concretada: false });
      showToast("Venta removida de reportes");
    }
  };

  const deleteQuote = async (id) => {
    await window.__FB.deleteQuote(id);
  };

  const shareQuote = async (q) => {
    const p = prices;

    const linesText = q.lines.map(l => {
      if (l.isGift) {
        if (l.category === INSUMO_KEY) {
          const name   = l.insumoName || 'Insumo';
          const qty    = Number(l.insumoQty) || 1;
          const prefix = qty > 1 ? `${qty}× ` : '';
          return `🎁 ${prefix}${name}\n   ↳ Regalo especial`;
        }
        const cat   = p[l.category];
        const grams = Number(l.grams) || 0;
        return `🎁 ${cat ? cat.name : l.category}\n   ↳ ${grams}g · Regalo especial`;
      }
      if (l.category === INSUMO_KEY) {
        const qty     = Number(l.insumoQty) || 1;
        const name    = l.insumoName || 'Insumo';
        const unitVal = (l.insumoValor !== undefined && l.insumoValor !== null) ? Number(l.insumoValor) : (l.insumoPrice || 0);
        const total   = unitVal * qty;
        const prefix  = qty > 1 ? `${qty}× ` : '';
        if (total === 0) return `🎁 ${prefix}${name}\n   ↳ Regalo especial`;
        return `💎 ${prefix}${name}\n   ↳ $${fmtCLP(total)}`;
      }
      if (l.category === LOTE_KEY) {
        const nombre = l.loteName || 'Lote';
        return `📦 ${nombre}\n   ↳ $${fmtCLP(Number(l.lotePrice) || 0)}`;
      }
      const cat   = p[l.category];
      const price = Number(l.customPrice) || 0;
      const grams = Number(l.grams) || 0;
      const total = Math.round(price * grams);
      const emoji = emojiForCategory(l.category, cat);
      return `${emoji} ${cat ? cat.name : l.category}\n   ↳ ${grams}g × $${fmtCLP(price)}/g  =  $${fmtCLP(total)}`;
    }).join('\n\n');

    // Resumen personalizado
    const firstName = (q.client || '').split(' ')[0].trim();
    const hasGift   = q.lines.some(l => l.isGift);
    const jewNames  = [...new Set(q.lines
      .filter(l => l.category !== INSUMO_KEY && l.category !== LOTE_KEY && !l.isGift)
      .map(l => p[l.category]?.name || l.category))];
    const loteNames = q.lines.filter(l => l.category === LOTE_KEY).map(l => l.loteName || 'lote');
    const allItems  = [...jewNames, ...loteNames];
    const joined    = allItems.length === 0 ? '' :
      allItems.length === 1 ? allItems[0].toLowerCase() :
      allItems.length === 2 ? `${allItems[0].toLowerCase()} y ${allItems[1].toLowerCase()}` :
      allItems.slice(0,-1).map(s => s.toLowerCase()).join(', ') + ` y ${allItems[allItems.length-1].toLowerCase()}`;

    const sep  = '──────────────────────';
    const text =
`✨ Detalle de ${q.client || 'cliente'}
${fmtDate(q.at)}

${linesText}

${sep}
⚖️  Peso total: ${fmtCLP(q.totalWeight)}g
💰  Total: $${fmtCLP(q.total)} CLP
${sep}`;

    if (navigator.share) { try { await navigator.share({ text }); return; } catch(_){} }
    try { await navigator.clipboard.writeText(text); showToast("¡Mensaje copiado al portapapeles!"); }
    catch(_) { showToast("No se pudo compartir"); }
  };

  // ── Pantalla de carga inicial ──
  if (fbUser === undefined) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12}}>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{width:36,height:36,borderRadius:'50%',border:'3px solid var(--line)',borderTopColor:'var(--gold)',animation:'spin 1s linear infinite'}}/>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-mute)',letterSpacing:'.2em'}}>CONECTANDO…</div>
      </div>
    );
  }

  if (!fbUser) return <LoginScreen onAuth={(user) => setFbUser(user)} />;

  return (
    <div className="app">
      <header className="brand">
        <div className="mark" aria-hidden>◆</div>
        <div style={{flex:1}}>
          <h1>Joyería <em>Aravena</em></h1>
          <div className="sub">{userProfile?.name || fbUser.email}{isAdmin ? ' · Admin' : ''}</div>
        </div>
        {isAdmin && (
          <button className="icon-btn" onClick={()=>setAdminOpen(true)} aria-label="Panel admin" title="Panel admin" style={{marginRight:6}}>
            <span style={{fontSize:14,lineHeight:1}}>👥</span>
          </button>
        )}
        <button className="icon-btn" onClick={()=>setThemeOpen(true)} aria-label="Cambiar tema" title="Cambiar tema" style={{marginRight:6}}>
          <span style={{fontSize:14,lineHeight:1}}>◐</span>
        </button>
        <button className="icon-btn" onClick={logout} aria-label="Cerrar sesión" title="Cerrar sesión">
          <Icon name="x" size={14}/>
        </button>
      </header>

      {themeOpen && (
        <ThemePicker theme={theme} setTheme={setTheme}
          customTheme={customTheme} setCustomTheme={setCustomTheme}
          onClose={()=>setThemeOpen(false)} />
      )}
      {adminOpen && isAdmin && (
        <AdminPanel currentUser={fbUser} onClose={()=>setAdminOpen(false)} />
      )}

      <nav className="tabs" role="tablist">
        <button className="tab" role="tab" aria-selected={tab==='calc'}    onClick={()=>setTab('calc')}>
          <Icon name="calc" size={14}/> Venta
        </button>
        <button className="tab" role="tab" aria-selected={tab==='hist'}    onClick={()=>setTab('hist')}>
          <Icon name="clock" size={14}/> Historial
        </button>
        <button className="tab" role="tab" aria-selected={tab==='reports'} onClick={()=>setTab('reports')}>
          <Icon name="share" size={14}/> Reportes
        </button>
        <button className="tab" role="tab" aria-selected={tab==='charts'}  onClick={()=>setTab('charts')}>
          <span style={{fontSize:13}}>📊</span> Gráficos
        </button>
      </nav>

      {tab === 'calc' && (
        <CalcTab
          clientName={clientName} setClientName={setClientName}
          pago={pago} setPago={setPago}
          scheduler={scheduler} setScheduler={setScheduler}
          attendant={attendant} setAttendant={setAttendant}
          concretada={concretada} setConcretada={setConcretada}
          lines={lines} prices={prices}
          addLine={addLine} removeLine={removeLine} updateLine={updateLine}
          totals={totals} resetCalc={resetCalc} saveQuote={saveQuote}
          copyMessage={copyMessage} canCopy={hasValidLines}
          customTotal={customTotal} setCustomTotal={setCustomTotal}
        />
      )}
      {tab === 'hist' && (
        <HistoryTab history={history} prices={prices}
          onDelete={deleteQuote} onDuplicate={loadQuote} onShare={shareQuote}
          onToggleConcretada={toggleConcretada} />
      )}
      {tab === 'reports' && (
        <ReportsTab history={history} prices={prices} onToggleConcretada={toggleConcretada} />
      )}
      {tab === 'charts' && (
        <ChartsTab history={history} prices={prices} />
      )}

      <div className={"toast" + (toast ? " show" : "")}>{toast}</div>

      {tab === 'calc' && (
        <button className="fab" onClick={() => copyMessage()} disabled={!hasValidLines}>
          <span className="ico">📋</span> Copiar mensaje
        </button>
      )}

      {editMode && <TweaksPanel prices={prices} setPrices={setPrices} onClose={()=>setEditMode(false)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'SW_UPDATED' && !_swReloaded) {
      _swReloaded = true;
      window.location.reload();
    }
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.update();
      setInterval(() => reg.update().catch(() => {}), 60000);
    }).catch(() => {});
  });
}
</script>
</body>
</html>
