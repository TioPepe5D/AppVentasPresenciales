// ---------- Reports Tab ----------
// ── helpers de período ──
const dayKey  = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const weekKey = (ts) => {
  const d = new Date(ts);
  // ISO week: lunes = día 1
  const day = d.getDay() || 7;
  const mon = new Date(d); mon.setDate(d.getDate() - day + 1);
  return `${mon.getFullYear()}-W${String(getISOWeek(mon)).padStart(2,'0')}`;
};
const getISOWeek = (d) => {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4); startOfWeek1.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  return Math.ceil(((d - startOfWeek1) / 86400000 + 1) / 7);
};
const yearKey = (ts) => String(new Date(ts).getFullYear());

const dayLabel  = (k) => { const [y,m,d] = k.split('-'); return new Date(+y,+m-1,+d).toLocaleDateString('es-CL',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}); };
const weekLabel = (k) => {
  const [yearStr, wStr] = k.split('-W');
  const year = +yearStr, week = +wStr;
  const jan4 = new Date(year, 0, 4);
  const startW1 = new Date(jan4); startW1.setDate(jan4.getDate() - (jan4.getDay()||7) + 1);
  const mon = new Date(startW1); mon.setDate(startW1.getDate() + (week-1)*7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = (d) => d.toLocaleDateString('es-CL',{day:'2-digit',month:'short'});
  return `${fmt(mon)} – ${fmt(sun)}`;
};
const yearLabel = (k) => k;

function ReportsTab({ history, prices, onToggleConcretada }){
  const [period, setPeriod] = useState('monthly'); // 'daily'|'weekly'|'monthly'|'yearly'

  // ── listas de períodos disponibles ──
  const allDays = useMemo(() => {
    const set = new Set(history.map(q => dayKey(q.at)));
    set.add(dayKey(Date.now()));
    return Array.from(set).sort().reverse();
  }, [history]);

  const allWeeks = useMemo(() => {
    const set = new Set(history.map(q => weekKey(q.at)));
    set.add(weekKey(Date.now()));
    return Array.from(set).sort().reverse();
  }, [history]);

  const allMonths = useMemo(() => {
    const set = new Set(history.map(q => monthKey(q.at)));
    set.add(monthKey(Date.now()));
    return Array.from(set).sort().reverse();
  }, [history]);

  const allYears = useMemo(() => {
    const set = new Set(history.map(q => yearKey(q.at)));
    set.add(yearKey(Date.now()));
    return Array.from(set).sort().reverse();
  }, [history]);

  const [selDay,   setSelDay]   = useState(() => dayKey(Date.now()));
  const [selWeek,  setSelWeek]  = useState(() => weekKey(Date.now()));
  const [selMonth, setSelMonth] = useState(() => monthKey(Date.now()));
  const [selYear,  setSelYear]  = useState(() => yearKey(Date.now()));

  // ── clave y label activos ──
  const { activeKey, activeLabel, activeList, setActive, keyFn, periodName } = useMemo(() => {
    if (period === 'daily')   return { activeKey: selDay,   activeLabel: dayLabel(selDay),   activeList: allDays,   setActive: setSelDay,   keyFn: dayKey,   periodName: 'Diario'   };
    if (period === 'weekly')  return { activeKey: selWeek,  activeLabel: weekLabel(selWeek),  activeList: allWeeks,  setActive: setSelWeek,  keyFn: weekKey,  periodName: 'Semanal'  };
    if (period === 'yearly')  return { activeKey: selYear,  activeLabel: yearLabel(selYear),  activeList: allYears,  setActive: setSelYear,  keyFn: yearKey,  periodName: 'Anual'    };
    return                           { activeKey: selMonth, activeLabel: monthLabel(selMonth), activeList: allMonths, setActive: setSelMonth, keyFn: monthKey, periodName: 'Mensual'  };
  }, [period, selDay, selWeek, selMonth, selYear, allDays, allWeeks, allMonths, allYears]);

  // ── cotizaciones del período ──
  const periodQuotes = useMemo(
    () => history.filter(q => keyFn(q.at) === activeKey && q.concretada),
    [history, keyFn, activeKey]
  );

  // ── resumen ──
  const summary = useMemo(() => {
    const byPerson = {};
    let totalVentas = 0, totalCostos = 0, totalGanancia = 0;
    const LOTE_CAT_MAP_REPORT = { cadena:'collar_pulsera_mujer_925', micro:'collar_pulsera_micro', italiana:'italiana_925', gf18k:'gf_18k' };
    const gramsByGroup = { cadena: 0, micro: 0, italiana: 0, gf18k: 0 };
    const catToGroup = {
      collar_pulsera_mujer_925:'cadena', collar_pulsera_hombre_925:'cadena',
      collar_pulsera_micro:'micro', aros_colgantes_925:'micro', anillos_925:'micro',
      italiana_925:'italiana', gf_18k:'gf18k',
    };
    const inc = (n, k, v) => {
      byPerson[n] = byPerson[n] || { agendado:0, atendido:0, empresa:0 };
      byPerson[n][k] += v;
    };
    for (const q of periodQuotes) {
      const total = Number(q.total) || 0;
      const { totalCost, profit } = quoteCostAndProfit(q, prices);
      const base = Math.max(0, profit);
      totalVentas += total; totalCostos += totalCost; totalGanancia += profit;
      const sched = normName((q.scheduler||'').trim() || EMPRESA);
      const att   = normName((q.attendant ||'').trim() || EMPRESA);
      inc(sched,'agendado', base*PCT_SCHEDULER);
      inc(att,  'atendido', base*PCT_ATTENDANT);
      inc(EMPRESA,'empresa', base*PCT_EMPRESA);
      for (const l of (q.lines||[])) {
        if (l.category === LOTE_KEY) {
          const gm = l.loteGramsMap || {};
          for (const [typeKey] of Object.entries(LOTE_CAT_MAP_REPORT))
            gramsByGroup[typeKey] = (gramsByGroup[typeKey]||0) + (Number(gm[typeKey])||0);
        } else if (catToGroup[l.category]) {
          gramsByGroup[catToGroup[l.category]] += Number(l.grams)||0;
        }
      }
    }
    const pagosByPerson = {};
    const empresa30PorPagador = {}; // 30% de ganancia por quien cobró
    for (const q of periodQuotes) {
      const who = (q.pago||'').trim();
      if (who) {
        pagosByPerson[who] = (pagosByPerson[who]||0) + (Number(q.total)||0);
        const { profit } = quoteCostAndProfit(q, prices);
        const base = Math.max(0, profit);
        empresa30PorPagador[who] = (empresa30PorPagador[who]||0) + Math.round(base * PCT_EMPRESA);
      }
    }
    const rows = Object.entries(byPerson).map(([name,v]) => ({
      name, ...v, comision: v.agendado+v.atendido+v.empresa, pagado: pagosByPerson[name]||0,
    })).sort((a,b) => b.comision - a.comision);
    for (const [name, pagado] of Object.entries(pagosByPerson))
      if (!rows.find(r => r.name===name)) rows.push({name,agendado:0,atendido:0,empresa:0,comision:0,pagado});
    const totalComisionEquipo = rows.reduce((s,r) => s+r.agendado+r.atendido, 0);
    const totalEmpresa        = rows.reduce((s,r) => s+r.empresa, 0);
    const totalPagos          = Object.values(pagosByPerson).reduce((s,v) => s+v, 0);
    const totalEmpresa30Rastreado = Object.values(empresa30PorPagador).reduce((s,v) => s+v, 0);
    return { rows, totalVentas, totalCostos, totalGanancia, totalComisionEquipo, totalEmpresa, gramsByGroup, pagosByPerson, totalPagos, empresa30PorPagador, totalEmpresa30Rastreado };
  }, [periodQuotes, prices]);

  // ── exportar CSV ──
  const exportCSVLegacy = () => {
    const header = ["Fecha","Cliente","Agendó","Atendió","Tramo","Gramos Total","G. Cadena","G. Micro","G. Italiana","G. GF 18K","Venta","Costo","Ganancia","Comisión Agendó (35%)","Comisión Atendió (35%)","Comisión Empresa (30%)"];
    const catToGroup = {
      collar_pulsera_mujer_925:'cadena', collar_pulsera_hombre_925:'cadena',
      collar_pulsera_micro:'micro', aros_colgantes_925:'micro', anillos_925:'micro',
      italiana_925:'italiana', gf_18k:'gf18k',
    };
    const rows = periodQuotes.map(q => {
      const total = Number(q.total)||0;
      const { totalCost, profit } = quoteCostAndProfit(q, prices);
      const base = Math.max(0, profit);
      const d = new Date(q.at);
      const fecha = d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      const gramsByGroup = {cadena:0, micro:0, italiana:0, gf18k:0};
      for (const l of (q.lines||[])) {
        if (l.category === LOTE_KEY) {
          const gm = l.loteGramsMap||{};
          for (const k of ['cadena','micro','italiana','gf18k']) gramsByGroup[k] += Number(gm[k])||0;
        } else if (catToGroup[l.category]) {
          gramsByGroup[catToGroup[l.category]] += Number(l.grams)||0;
        }
      }
      const r1 = (x) => { const n = Math.round((x||0) * 10) / 10; return n === 0 ? '' : n.toLocaleString('es-CL', {maximumFractionDigits:1}); };
      const b0 = (n) => (n === 0 ? '' : n);
      return [fecha, q.client||'', normName(q.scheduler||EMPRESA), normName(q.attendant||EMPRESA), TIER_RULES[q.tier]?TIER_RULES[q.tier].label:'', r1(q.totalWeight), r1(gramsByGroup.cadena), r1(gramsByGroup.micro), r1(gramsByGroup.italiana), r1(gramsByGroup.gf18k), b0(total), b0(Math.round(totalCost)), b0(Math.round(profit)), b0(Math.round(base*PCT_SCHEDULER)), b0(Math.round(base*PCT_ATTENDANT)), b0(Math.round(base*PCT_EMPRESA))];
    });
    const esc = (v) => { const s=String(v??''); return /[",;\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; };
    const csv = [header,...rows.reverse()].map(r=>r.map(esc).join(';')).join('\r\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`ventas_${period}_${activeKey}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const exportCSV = () => {
    const header = ["Fecha","Cliente","Pago:","Atendi\u00f3:","Agendo:","Cadena:","Micro:","Italy:","GF 18K:","Insumos: (Costo Total)","Total Venta:"];
    const catToGroup = {
      collar_pulsera_mujer_925: 'cadena',
      collar_pulsera_hombre_925: 'cadena',
      collar_pulsera_micro: 'micro',
      aros_colgantes_925: 'micro',
      anillos_925: 'micro',
      italiana_925: 'italiana',
      gf_18k: 'gf18k',
    };
    const rows = periodQuotes.map(q => {
      const d = new Date(q.at);
      const fecha = d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
      const gramsByGroup = { cadena: 0, micro: 0, italiana: 0, gf18k: 0 };
      let insumosCost = 0;

      for (const l of (q.lines || [])) {
        if (l.category === LOTE_KEY) {
          const gm = l.loteGramsMap || {};
          for (const k of ['cadena','micro','italiana','gf18k']) gramsByGroup[k] += Number(gm[k]) || 0;
        } else if (l.category === INSUMO_KEY) {
          const cost = Number(l.insumoCost) || Number(l.insumoPrice) || 0;
          const qty = Number(l.insumoQty) || 1;
          insumosCost += cost * qty;
        } else if (catToGroup[l.category]) {
          gramsByGroup[catToGroup[l.category]] += Number(l.grams) || 0;
        }
      }

      const r1 = (x) => { const n = Math.round((x || 0) * 10) / 10; return n === 0 ? '' : n.toLocaleString('es-CL', { maximumFractionDigits: 1 }); };
      const b0 = (n) => (n === 0 ? '' : n);
      return [fecha, q.client || '', normName(q.pago || ''), normName(q.attendant || EMPRESA), normName(q.scheduler || EMPRESA), r1(gramsByGroup.cadena), r1(gramsByGroup.micro), r1(gramsByGroup.italiana), r1(gramsByGroup.gf18k), b0(Math.round(insumosCost)), b0(Math.round(Number(q.total) || 0))];
    });
    const esc = (v) => { const s = String(v ?? ''); return /[",;\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
    const csv = [header, ...rows.reverse()].map(r => r.map(esc).join(';')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `ventas_${period}_${activeKey}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  // ── etiqueta de selector ──
  const selectorLabel = { daily:'Día', weekly:'Semana', monthly:'Mes', yearly:'Año' }[period];

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-head">
          <h2>Reporte <em>{periodName.toLowerCase()}</em></h2>
          <span className="eyebrow">{activeLabel}</span>
        </div>

        {/* ── selector de período ── */}
        <div style={{padding:'10px 14px 0',display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['daily','Diario 📅'],['weekly','Semanal 📆'],['monthly','Mensual 🗓️'],['yearly','Anual 📊']].map(([k,lbl]) => (
            <button key={k}
              className={`chart-period-btn${period===k?' active':''}`}
              onClick={()=>setPeriod(k)}
              style={{fontSize:11,padding:'5px 12px'}}
            >{lbl}</button>
          ))}
        </div>

        <div style={{padding:'12px 14px', display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
          <div className="control-labeled" style={{flex:'1 1 180px'}}>
            <label>{selectorLabel}</label>
            <div className="control">
              <select value={activeKey} onChange={e => setActive(e.target.value)}>
                {activeList.map(k => (
                  <option key={k} value={k}>
                    {period==='daily' ? dayLabel(k) : period==='weekly' ? weekLabel(k) : period==='yearly' ? yearLabel(k) : monthLabel(k)}
                  </option>
                ))}
              </select>
            </div>
          </div>
          <button className="btn accent" onClick={exportCSV} disabled={periodQuotes.length === 0}>
            <Icon name="share" size={14}/> Exportar CSV
          </button>
        </div>

        <div className="report-summary">
          <div className="rs-card">
            <div className="rs-label">Ventas</div>
            <div className="rs-value">${fmtCLP(summary.totalVentas)}</div>
            <div className="rs-sub">{periodQuotes.length} concretada{periodQuotes.length===1?'':'s'}</div>
          </div>
          <div className="rs-card">
            <div className="rs-label">Costos</div>
            <div className="rs-value">${fmtCLP(summary.totalCostos)}</div>
            <div className="rs-sub">Mercadería</div>
          </div>
          <div className="rs-card">
            <div className="rs-label">Ganancia</div>
            <div className="rs-value">${fmtCLP(summary.totalGanancia)}</div>
            <div className="rs-sub">Venta − costo</div>
          </div>
          <div className="rs-card">
            <div className="rs-label">Comisiones equipo</div>
            <div className="rs-value">${fmtCLP(summary.totalComisionEquipo)}</div>
            <div className="rs-sub">70% de ganancia</div>
          </div>
          <div className="rs-card">
            <div className="rs-label">Empresa</div>
            <div className="rs-value">${fmtCLP(summary.totalEmpresa)}</div>
            <div className="rs-sub">30% de ganancia</div>
          </div>
          <div className="rs-card" style={{gridColumn:'span 2'}}>
            <div className="rs-label">Gramos vendidos</div>
            <div style={{marginTop:6,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 12px'}}>
              {[['cadena','Cadena 🔗'],['micro','Micro 💎'],['italiana','Italy 🇮🇹'],['gf18k','GF 18K ☀️']].map(([k,label]) => (
                <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',fontSize:12,fontFamily:'var(--mono)',fontWeight:500}}>
                  <span style={{color:'var(--ink-mute)'}}>{label}</span>
                  <span style={{color:summary.gramsByGroup[k]>0?'var(--gold-2)':'var(--ink-mute)',fontWeight:600}}>
                    {summary.gramsByGroup[k]>0?`${fmtCLP(summary.gramsByGroup[k])}g`:'—'}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {summary.rows.length > 0 && (
        <div className="card">
          <div className="card-head"><h2>Por <em>persona</em></h2></div>

          {/* ── PAGOS ── */}
          <div style={{display:'none',padding:'10px 14px 2px'}}>
            <div className="eyebrow" style={{marginBottom:8,letterSpacing:'.18em'}}>💰 Pagos recibidos</div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {TEAM.map(name => {
                const p = summary.pagosByPerson[name] || 0;
                if (p === 0) return null;
                return (
                  <div key={name} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'5px 0',borderBottom:'1px dashed var(--line)',fontFamily:'var(--mono)',fontSize:13}}>
                    <span style={{color:'var(--ink-dim)',fontWeight:600}}>{name}</span>
                    <span style={{color:'var(--ink)',fontWeight:700}}>${fmtCLP(p)}</span>
                  </div>
                );
              })}
              {TEAM.every(n => !summary.pagosByPerson[n]) && (
                <div style={{color:'var(--ink-mute)',fontSize:12,fontStyle:'italic',padding:'4px 0'}}>Sin pagos registrados este período</div>
              )}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'6px 0 2px',fontFamily:'var(--mono)',fontSize:12}}>
                <span style={{color:'var(--ink-mute)',letterSpacing:'.1em',textTransform:'uppercase'}}>Total</span>
                <span style={{color:'var(--gold-2)',fontWeight:700}}>${fmtCLP(summary.totalPagos)}</span>
              </div>
            </div>
          </div>

          {/* ── COMISIONES ── */}
          <div style={{padding:'10px 14px 2px',borderTop:'1px solid var(--line)',marginTop:8}}>
            <div className="eyebrow" style={{marginBottom:8,letterSpacing:'.18em'}}>📊 Comisiones ganadas</div>
            <div className="report-people" style={{padding:0}}>
              {summary.rows.map(r => (
                <div key={r.name} className="rp-row">
                  <div className="rp-name">{r.name}{r.name===EMPRESA&&<span className="rp-tag"> · empresa</span>}</div>
                  <div className="rp-breakdown">
                    <span>Agendó: <b>${fmtCLP(r.agendado)}</b></span>
                    <span>Atendió: <b>${fmtCLP(r.atendido)}</b></span>
                    {r.empresa > 0 && <span>Empresa: <b>${fmtCLP(r.empresa)}</b></span>}
                  </div>
                  <div className="rp-total">${fmtCLP(r.comision)}</div>

              ))}

      {/* ── RESUMEN FINANCIERO ── */}

          <div style={{padding:'14px 14px 16px',display:'flex',flexDirection:'column',gap:8}}>
            {[
              ['Venta total',       summary.totalVentas,         'var(--gold-2)'],
              ['Costo total',       summary.totalCostos,         'var(--ink-dim)'],
              ['Ganancia',          summary.totalGanancia,       summary.totalGanancia>=0?'#4ade80':'var(--danger)'],

              ['Empresa (30%)',     summary.totalEmpresa,        'var(--ink)'],
            ].map(([label,val,color]) => (
              <div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'6px 0',borderBottom:'1px solid var(--line)',fontFamily:'var(--mono)'}}>
                <span style={{fontSize:11,letterSpacing:'.14em',color:'var(--ink-mute)',textTransform:'uppercase'}}>{label}</span>
                <span style={{fontSize:15,fontWeight:700,color}}>${fmtCLP(val)}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'8px 0 0',fontFamily:'var(--mono)'}}>
              <span style={{fontSize:11,letterSpacing:'.14em',color:'var(--ink-mute)',textTransform:'uppercase'}}>Pagos registrados (campo pago)</span>
              <span style={{fontSize:15,fontWeight:700,color:'var(--ink-dim)'}}>
                ${fmtCLP(summary.totalPagos)}
              </span>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <div className="card-head">
          <h2>Ventas del <em>{periodName.toLowerCase()}</em></h2>
          <span className="eyebrow">{periodQuotes.length}</span>
        </div>
        {periodQuotes.length === 0 ? (
          <div className="empty">
            <div className="diamond"/>
            <p>No hay ventas concretadas en este período</p>
            <div className="hint">Marca las cotizaciones como "Venta concretada" para incluirlas</div>
          </div>
        ) : (
          <SalesList quotes={periodQuotes} prices={prices} />
        )}
      </div>

    </div>
  );
}

// ---------- Charts Tab ----------
function ChartsTab({ history, prices }) {
  const [period, setPeriod] = useState(6); // last N months

  // ── helpers ──
  const getCssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

  // ── datos: ventas por mes ──
  const monthlyData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = period - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      months.push({ key, label: d.toLocaleDateString('es-CL', { month: 'short', year: '2-digit' }) });
    }
    const sales = {};
    const counts = {};
    for (const q of history) {
      if (!q.concretada) continue;
      const mk = monthKey(q.at);
      sales[mk] = (sales[mk] || 0) + (Number(q.total) || 0);
      counts[mk] = (counts[mk] || 0) + 1;
    }
    return months.map(m => ({ ...m, total: sales[m.key] || 0, count: counts[m.key] || 0 }));
  }, [history, period]);

  // ── datos: por persona ──
  const personData = useMemo(() => {
    const now = new Date();
    const cutoff = new Date(now.getFullYear(), now.getMonth() - period + 1, 1).getTime();
    const totals = {};
    for (const q of history) {
      if (!q.concretada || q.at < cutoff) continue;
      const total = Number(q.total) || 0;
      const { profit } = quoteCostAndProfit(q, prices);
      const base = Math.max(0, profit);
      const sched = normName((q.scheduler || '').trim() || EMPRESA);
      const att   = normName((q.attendant  || '').trim() || EMPRESA);
      totals[sched] = (totals[sched] || 0) + base * PCT_SCHEDULER;
      totals[att]   = (totals[att]   || 0) + base * PCT_ATTENDANT;
    }
    return Object.entries(totals)
      .map(([name, value]) => ({ name, value: Math.round(value) }))
      .filter(x => x.value > 0)
      .sort((a, b) => b.value - a.value);
  }, [history, prices, period]);

  // ── datos: gramos por categoría ──
  const gramsData = useMemo(() => {
    const now = new Date();
    const cutoff = new Date(now.getFullYear(), now.getMonth() - period + 1, 1).getTime();
    const LOTE_CAT_MAP = { cadena: 'collar_pulsera_mujer_925', micro: 'collar_pulsera_micro', italiana: 'italiana_925', gf18k: 'gf_18k' };
    const grams = {};
    for (const q of history) {
      if (!q.concretada || q.at < cutoff) continue;
      for (const l of (q.lines || [])) {
        if (l.category === INSUMO_KEY) continue;
        if (l.category === LOTE_KEY) {
          const gm = l.loteGramsMap || {};
          for (const [typeKey, catKey] of Object.entries(LOTE_CAT_MAP)) {
            const g = Number(gm[typeKey]) || 0;
            if (g > 0) grams[catKey] = (grams[catKey] || 0) + g;
          }
        } else {
          const g = Number(l.grams) || 0;
          if (g > 0) grams[l.category] = (grams[l.category] || 0) + g;
        }
      }
    }
    return Object.entries(grams)
      .map(([key, g]) => ({ key, name: prices[key]?.name || key, grams: Math.round(g * 10) / 10 }))
      .filter(x => x.grams > 0)
      .sort((a, b) => b.grams - a.grams);
  }, [history, prices, period]);

  // ── KPIs ──
  const kpis = useMemo(() => {
    const now = new Date();
    const cutoff = new Date(now.getFullYear(), now.getMonth() - period + 1, 1).getTime();
    let ventas = 0, count = 0, ganancia = 0;
    for (const q of history) {
      if (!q.concretada || q.at < cutoff) continue;
      ventas += Number(q.total) || 0;
      const { profit } = quoteCostAndProfit(q, prices);
      ganancia += profit;
      count++;
    }
    return { ventas, count, ganancia, ticket: count ? Math.round(ventas / count) : 0 };
  }, [history, prices, period]);

  // ── Bar Chart (ventas mensuales) ──
  const barRef = useRef(null);
  useEffect(() => {
    const canvas = barRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth;
    const H = 200;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const gold    = getCssVar('--gold');
    const gold2   = getCssVar('--gold-2');
    const line    = getCssVar('--line');
    const inkMute = getCssVar('--ink-mute');
    const inkDim  = getCssVar('--ink-dim');
    const bg2     = getCssVar('--bg-2');

    ctx.clearRect(0, 0, W, H);
    const maxVal = Math.max(...monthlyData.map(m => m.total), 1);
    const pad = { top: 20, right: 10, bottom: 38, left: 10 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top - pad.bottom;
    const n = monthlyData.length;
    const barW = Math.max(4, (chartW / n) * 0.55);
    const gap   = chartW / n;

    // Grid lines
    ctx.strokeStyle = line;
    ctx.lineWidth = 1;
    [0, 0.25, 0.5, 0.75, 1].forEach(t => {
      const y = pad.top + chartH * (1 - t);
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    });

    monthlyData.forEach((m, i) => {
      const x = pad.left + gap * i + gap / 2;
      const barH = m.total ? Math.max(4, (m.total / maxVal) * chartH) : 0;
      const y = pad.top + chartH - barH;

      // gradient bar
      if (barH > 0) {
        const grad = ctx.createLinearGradient(0, y, 0, pad.top + chartH);
        grad.addColorStop(0, gold2);
        grad.addColorStop(1, gold);
        ctx.fillStyle = grad;
        ctx.beginPath();
        const r = Math.min(5, barW / 2);
        ctx.moveTo(x - barW/2 + r, y);
        ctx.lineTo(x + barW/2 - r, y);
        ctx.quadraticCurveTo(x + barW/2, y, x + barW/2, y + r);
        ctx.lineTo(x + barW/2, pad.top + chartH);
        ctx.lineTo(x - barW/2, pad.top + chartH);
        ctx.lineTo(x - barW/2, y + r);
        ctx.quadraticCurveTo(x - barW/2, y, x - barW/2 + r, y);
        ctx.closePath();
        ctx.fill();
      }

      // label
      ctx.fillStyle = inkMute;
      ctx.font = `500 9px 'Montserrat', sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(m.label.toUpperCase(), x, H - 6);

      // value above bar
      if (m.total > 0) {
        ctx.fillStyle = inkDim;
        ctx.font = `600 9px 'Montserrat', sans-serif`;
        const label = m.total >= 1000000 ? `$${(m.total/1000000).toFixed(1)}M` : m.total >= 1000 ? `$${Math.round(m.total/1000)}K` : `$${m.total}`;
        ctx.fillText(label, x, y - 5);
      }
    });
  }, [monthlyData]);

  // ── Donut Chart (por persona) ──
  const donutRef = useRef(null);
  useEffect(() => {
    const canvas = donutRef.current;
    if (!canvas || personData.length === 0) return;
    const dpr = window.devicePixelRatio || 1;
    const SIZE = Math.min(canvas.offsetWidth, 220);
    canvas.width  = SIZE * dpr;
    canvas.height = SIZE * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, SIZE, SIZE);

    const total = personData.reduce((s, d) => s + d.value, 0);
    const cx = SIZE / 2, cy = SIZE / 2;
    const outer = SIZE * 0.42, inner = SIZE * 0.26;
    const PALETTE = [
      getCssVar('--gold-2'), getCssVar('--gold'),
      '#6ee7b7', '#f4a380', '#fb923c', '#f472b6', '#22d3ee', '#818cf8'
    ];
    const line = getCssVar('--line');

    let startAngle = -Math.PI / 2;
    personData.forEach((d, i) => {
      const slice = (d.value / total) * 2 * Math.PI;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, outer, startAngle, startAngle + slice);
      ctx.closePath();
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.fill();
      startAngle += slice;
    });

    // inner hole
    ctx.beginPath();
    ctx.arc(cx, cy, inner, 0, Math.PI * 2);
    ctx.fillStyle = getCssVar('--panel');
    ctx.fill();

    // center text
    ctx.fillStyle = getCssVar('--ink-dim');
    ctx.font = `700 ${Math.round(SIZE * 0.065)}px 'Montserrat', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = total >= 1000000 ? `$${(total/1000000).toFixed(1)}M` : `$${Math.round(total/1000)}K`;
    ctx.fillText(label, cx, cy);
  }, [personData]);

  // ── Horizontal Bar Chart (gramos por cat) ──
  const hbarRef = useRef(null);
  useEffect(() => {
    const canvas = hbarRef.current;
    if (!canvas || gramsData.length === 0) return;
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.offsetWidth;
    const ROW_H = 36, PAD_V = 12, PAD_H = 14;
    const H = gramsData.length * ROW_H + PAD_V * 2;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    const maxG = Math.max(...gramsData.map(d => d.grams), 1);
    const labelW = Math.min(W * 0.38, 140);
    const barArea = W - labelW - PAD_H * 2 - 50;
    const gold2 = getCssVar('--gold-2');
    const gold  = getCssVar('--gold');
    const inkDim  = getCssVar('--ink-dim');
    const inkMute = getCssVar('--ink-mute');
    const line    = getCssVar('--line');

    gramsData.forEach((d, i) => {
      const y = PAD_V + i * ROW_H;
      const barH = ROW_H * 0.45;
      const barY = y + (ROW_H - barH) / 2;
      const barW = Math.max(4, (d.grams / maxG) * barArea);

      // label
      ctx.fillStyle = inkDim;
      ctx.font = `500 10px 'Montserrat', sans-serif`;
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      // strip emoji for canvas
      const name = d.name.replace(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27FF}]/gu, '').trim();
      ctx.fillText(name, PAD_H + labelW, y + ROW_H / 2);

      // bar background
      ctx.fillStyle = line;
      ctx.beginPath();
      const r2 = barH / 2;
      ctx.roundRect(PAD_H + labelW + 8, barY, barArea, barH, r2);
      ctx.fill();

      // bar fill
      const grad = ctx.createLinearGradient(PAD_H + labelW + 8, 0, PAD_H + labelW + 8 + barW, 0);
      grad.addColorStop(0, gold2);
      grad.addColorStop(1, gold);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(PAD_H + labelW + 8, barY, barW, barH, r2);
      ctx.fill();

      // grams value
      ctx.fillStyle = inkMute;
      ctx.font = `600 9px 'Montserrat', sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(`${d.grams}g`, PAD_H + labelW + 8 + barArea + 6, y + ROW_H / 2);
    });
  }, [gramsData]);

  const totalVentas = kpis.ventas;
  const hasData = history.some(q => q.concretada);

  return (
    <div className="fade-in">
      {/* Selector de período */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,letterSpacing:'.18em',color:'var(--ink-mute)',textTransform:'uppercase'}}>Período</div>
        <div className="chart-period-sel">
          {[3,6,12].map(n => (
            <button key={n} className={`chart-period-btn${period===n?' active':''}`} onClick={()=>setPeriod(n)}>
              {n}M
            </button>
          ))}
        </div>
      </div>

      {!hasData ? (
        <div className="card">
          <div className="chart-empty">
            <div style={{fontSize:36,marginBottom:12}}>📊</div>
            <p style={{margin:0,color:'var(--ink-dim)',fontWeight:600}}>Sin datos todavía</p>
            <p style={{margin:'6px 0 0',fontSize:12,color:'var(--ink-mute)'}}>Confirma ventas desde Historial para ver tus gráficos</p>
          </div>
        </div>
      ) : (
        <div className="charts-grid">

          {/* KPIs */}
          <div className="chart-kpi-row">
            <div className="chart-kpi">
              <div className="chart-kpi-label">Ventas</div>
              <div className="chart-kpi-value" style={{fontSize:14}}>${totalVentas>=1000000?(totalVentas/1000000).toFixed(1)+'M':totalVentas>=1000?Math.round(totalVentas/1000)+'K':fmtCLP(totalVentas)}</div>
              <div className="chart-kpi-sub">{kpis.count} venta{kpis.count!==1?'s':''}</div>
            </div>
            <div className="chart-kpi">
              <div className="chart-kpi-label">Ganancia</div>
              <div className="chart-kpi-value" style={{fontSize:14,color:kpis.ganancia>=0?'var(--gold-2)':'var(--danger)'}}>${kpis.ganancia>=1000000?(kpis.ganancia/1000000).toFixed(1)+'M':kpis.ganancia>=1000?Math.round(kpis.ganancia/1000)+'K':fmtCLP(Math.abs(kpis.ganancia))}</div>
              <div className="chart-kpi-sub">Neta</div>
            </div>
            <div className="chart-kpi">
              <div className="chart-kpi-label">Ticket</div>
              <div className="chart-kpi-value" style={{fontSize:14}}>${kpis.ticket>=1000?Math.round(kpis.ticket/1000)+'K':fmtCLP(kpis.ticket)}</div>
              <div className="chart-kpi-sub">Promedio</div>
            </div>
          </div>

          {/* Bar chart ventas */}
          <div className="chart-card">
            <div className="chart-head">
              <h3>Ventas <em>mensuales</em></h3>
              <span className="eyebrow">CLP</span>
            </div>
            <div className="chart-body">
              <div className="chart-canvas-wrap">
                <canvas ref={barRef} style={{height:200}}/>
              </div>
            </div>
          </div>

          {/* Donut por persona */}
          {personData.length > 0 && (
            <div className="chart-card">
              <div className="chart-head">
                <h3>Comisiones <em>por persona</em></h3>
                <span className="eyebrow">Equipo</span>
              </div>
              <div className="chart-body" style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
                <div style={{flexShrink:0}}>
                  <div className="chart-canvas-wrap" style={{width:180,maxWidth:'100%'}}>
                    <canvas ref={donutRef} style={{width:180,height:180}}/>
                  </div>
                </div>
                <div className="chart-legend" style={{flex:1,minWidth:120,flexDirection:'column',gap:8}}>
                  {personData.map((d,i) => {
                    const PALETTE = ['var(--gold-2)','var(--gold)','#6ee7b7','#f4a380','#fb923c','#f472b6','#22d3ee','#818cf8'];
                    const total = personData.reduce((s,x)=>s+x.value,0);
                    const pct = total ? Math.round(d.value/total*100) : 0;
                    return (
                      <div key={d.name} className="chart-legend-item">
                        <span className="chart-legend-dot" style={{background:PALETTE[i%PALETTE.length]}}/>
                        <span style={{flex:1}}>{d.name}</span>
                        <span style={{color:'var(--gold-2)',fontWeight:700}}>{pct}%</span>
                        <span style={{color:'var(--ink-mute)',marginLeft:6}}>${d.value>=1000?Math.round(d.value/1000)+'K':fmtCLP(d.value)}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* Horizontal bars gramos */}
          {gramsData.length > 0 && (
            <div className="chart-card">
              <div className="chart-head">
                <h3>Gramos <em>por categoría</em></h3>
                <span className="eyebrow">g vendidos</span>
              </div>
              <div className="chart-body">
                <div className="chart-canvas-wrap">
                  <canvas ref={hbarRef}/>
                </div>
              </div>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function App(){
  const [fbUser, setFbUser]           = useState(undefined); // undefined=cargando, null=no authed
  const [userProfile, setUserProfile] = useState(null);
  const isAdmin = userProfile?.role === 'admin' || fbUser?.email === window.__FB?.ADMIN_EMAIL;
  const [adminOpen, setAdminOpen]     = useState(false);

  // Escuchar estado de auth Firebase
  useEffect(() => {
    if (!window.__FB) return;
    const unsub = window.__FB.onAuthStateChanged(async (user) => {
      setFbUser(user);
      if (user) {
        let profile = await window.__FB.getUserProfile(user.uid);
        if (!profile) {
          profile = { uid: user.uid, email: user.email, name: user.email.split('@')[0],
            role: user.email === window.__FB.ADMIN_EMAIL ? 'admin' : 'user', createdAt: Date.now() };
          await window.__FB.saveUserProfile(user.uid, profile);
        }
        setUserProfile(profile);
      } else {
        setUserProfile(null);
      }
    });
    return () => unsub();
  }, []);

  const [tab, setTab] = useState(() => localStorage.getItem(LS_TAB) || 'calc');
  const [prices, setPrices] = useState(() => {
    try {
      const s = localStorage.getItem(LS_PRICES);
      if (s) {
        const stored = JSON.parse(s);
        const merged = {};
        for (const k of Object.keys(stored)) {
          merged[k] = { ...stored[k] };
          if (DEFAULT_PRICES[k]) {
            merged[k].cost        = DEFAULT_PRICES[k].cost;
            merged[k].costKilero  = DEFAULT_PRICES[k].costKilero;
            merged[k].prices      = [...DEFAULT_PRICES[k].prices];
            merged[k].name        = DEFAULT_PRICES[k].name;
            merged[k].material    = DEFAULT_PRICES[k].material;
          }
        }
        for (const k of Object.keys(DEFAULT_PRICES)) {
          if (!merged[k]) merged[k] = { ...DEFAULT_PRICES[k] };
        }
        return merged;
      }
    } catch(e){}
    return DEFAULT_PRICES;
  });

  // Historia desde Firestore (tiempo real)
  const [history, setHistory]           = useState([]);
  const [historyLoading, setHistoryLoading] = useState(false);

  useEffect(() => {
    if (!fbUser || !window.__FB) return;
    setHistoryLoading(true);
    let unsub;
    if (isAdmin) {
      unsub = window.__FB.listenAllQuotes(quotes => { setHistory(quotes); setHistoryLoading(false); });
    } else {
      unsub = window.__FB.listenMyQuotes(fbUser.uid, quotes => { setHistory(quotes); setHistoryLoading(false); });
    }
    return () => unsub && unsub();
  }, [fbUser?.uid, isAdmin]);

  const [clientName, setClientName] = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.clientName || ""; } catch { return ""; } });
  const [scheduler, setScheduler]   = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.scheduler || ""; } catch { return ""; } });
  const [attendant, setAttendant]   = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.attendant || ""; } catch { return ""; } });
  const [pago, setPago]             = useState(() => { try { return JSON.parse(localStorage.getItem(LS_DRAFT))?.pago || localStorage.getItem(LS_PAGO) || ""; } catch { return localStorage.getItem(LS_PAGO) || ""; } });
  const [concretada, setConcretada] = useState(false);
  const [lines, setLines]           = useState(() => { try { const d = JSON.parse(localStorage.getItem(LS_DRAFT)); return d?.lines?.length ? d.lines : [{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]; } catch { return [{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]; } });
  const [customTotal, setCustomTotal] = useState("");

  const [toast, setToast]   = useState("");
  const toastTimer           = useRef(null);
  const showToast            = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2200);
  }, []);

  // Tweaks (modo edición por postMessage)
  const [editMode, setEditMode] = useState(false);
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persistencia local (precios, tab, pago, borrador calculadora)
  useEffect(() => { localStorage.setItem(LS_TAB,    tab);                     }, [tab]);
  useEffect(() => { localStorage.setItem(LS_PRICES, JSON.stringify(prices));  }, [prices]);
  useEffect(() => { localStorage.setItem(LS_PAGO,   pago);                    }, [pago]);
  useEffect(() => {
    localStorage.setItem(LS_DRAFT, JSON.stringify({ clientName, scheduler, attendant, pago, lines }));
  }, [clientName, scheduler, attendant, pago, lines]);

  // Tema
  const [theme, setTheme]           = useState(() => localStorage.getItem(LS_THEME) || 'dark');
  const [customTheme, setCustomTheme] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_CUSTOM_THEME)) || DEFAULT_CUSTOM; }
    catch(e) { return DEFAULT_CUSTOM; }
  });
  const [themeOpen, setThemeOpen] = useState(false);
  useEffect(() => { applyTheme(theme, customTheme); localStorage.setItem(LS_THEME, theme); }, [theme, customTheme]);
  useEffect(() => { localStorage.setItem(LS_CUSTOM_THEME, JSON.stringify(customTheme)); }, [customTheme]);

  const logout = async () => {
    await window.__FB.signOut();
    setFbUser(null); setUserProfile(null);
  };

  const totals    = useMemo(() => computeTotals(lines, prices), [lines, prices]);
  const addLine   = () => setLines(ls => [...ls, { id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
  const removeLine = (id) => setLines(ls => ls.length > 1 ? ls.filter(l => l.id !== id) : ls);
  const updateLine = (id, patch) => setLines(ls => ls.map(l => l.id === id ? { ...l, ...patch } : l));

  const resetCalc = () => {
    setLines([{ id: uid(), category: CATEGORY_ORDER[0], grams: "" }]);
    setClientName(""); setScheduler(""); setAttendant(""); setConcretada(false);
    setCustomTotal("");
    localStorage.removeItem(LS_DRAFT);
  };

  const isValidLine = (l) => {
    if (l.category === INSUMO_KEY) return Number(l.insumoCost) > 0 || !!(l.insumoName && l.insumoName.trim());
    if (l.category === LOTE_KEY)   return Number(l.lotePrice) > 0;
    return Number(l.grams) > 0 && Number(l.customPrice) > 0;
  };
  const hasValidLines = lines.some(isValidLine);

  const copyMessage = async () => {
    const validLines = lines.filter(isValidLine);
    if (validLines.length === 0) return;
    const piezas = buildMessagePiezas(validLines, prices);
    const ventaTotal = customTotal !== "" ? (Number(customTotal.toString().replace(/\D/g,"")) || totals.total) : totals.total;
    const msg = `Nombre Cliente : ${clientName.trim()}
Pago: ${pago}
Atencion : ${attendant}
Agenda : ${scheduler}

${piezas}

Venta: $${fmtCLP(ventaTotal)}${totals.tier === 4 ? '\n(Precio Kilero)' : ''}`;
    try {
      if (navigator.share) {
        await navigator.share({ text: msg });
        showToast("¡Mensaje enviado!");
      } else {
        await navigator.clipboard.writeText(msg); showToast("¡Mensaje copiado!");
      }
    } catch (e) {
      if (e?.name === 'AbortError') return;
      const ta = document.createElement('textarea');
      ta.value = msg; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast("¡Mensaje copiado!"); } catch(_){ showToast("No se pudo copiar"); }
      document.body.removeChild(ta);
    }
  };

  const saveQuote = async () => {
    const validLines = lines.filter(isValidLine);
    if (validLines.length === 0) { showToast("Agrega al menos una línea"); return; }
    const costsSnap = {};
    let totalCost = 0;
    const kilero = isKileroTier(totals.tier);
    for (const l of validLines) {
      if (l.category === INSUMO_KEY) {
        const cost = Number(l.insumoCost) || 0;
        const qty  = 1;
        totalCost += cost * qty; continue;
      }
      if (l.category === LOTE_KEY) {
        // El costo del lote se calcula por gramaje × costo de cada categoría
        const gramsMap = l.loteGramsMap || {};
        const LOTE_CAT_MAP = {
          cadena:   'collar_pulsera_mujer_925',
          micro:    'collar_pulsera_micro',
          italiana: 'italiana_925',
          gf18k:    'gf_18k',
        };
        let loteCost = 0;
        for (const [typeKey, catKey] of Object.entries(LOTE_CAT_MAP)) {
          const g = Number(gramsMap[typeKey]) || 0;
          if (g > 0) {
            const c = effectiveCost(prices[catKey], totals.tier);
            loteCost += c * g;
          }
        }
        totalCost += loteCost;
        continue;
      }
      const g = Number(l.grams) || 0;
      const c = effectiveCost(prices[l.category], totals.tier);
      costsSnap[l.category] = c;
      totalCost += c * g;
    }
    const profit = (Number(totals.total) || 0) - totalCost;
    const entry = {
      id: uid(), at: Date.now(),
      client: clientName.trim(), pago, scheduler, attendant,
      concretada: true,
      userId:   fbUser.uid,
      userName: userProfile?.name || fbUser.email,
      lines: validLines.map(l => {
        if (l.category === INSUMO_KEY) {
          const cost  = Number(l.insumoCost) || 0;
          // Si insumoValor fue ingresado (incluso como 0 = regalo), respetarlo; si no, usar cost
          const valor = (l.insumoValor !== '' && l.insumoValor !== undefined && l.insumoValor !== null)
            ? Number(l.insumoValor)
            : cost;
          const qty   = 1;
          return { category: INSUMO_KEY, insumoName: l.insumoName || 'Insumo', insumoCost: cost, insumoValor: valor, insumoQty: qty, insumoPrice: valor, grams: 0 };
        }
        if (l.category === LOTE_KEY) {
          const gramsMap    = l.loteGramsMap || {};
          const totalGrams  = Object.values(gramsMap).reduce((s,v) => s+(Number(v)||0), 0);
          return { category: LOTE_KEY, loteName: l.loteName || '', loteGramsMap: gramsMap, lotePrice: Number(l.lotePrice) || 0, grams: totalGrams };
        }
        return { category: l.category, grams: Number(l.grams), customPrice: Number(l.customPrice) || 0 };
      }),
      tier: totals.tier, total: totals.total, totalWeight: totals.totalWeight,
      pago, kilero, costsSnap, totalCost, profit,
    };
    try {
      // Limpiar undefined antes de guardar en Firestore
      const cleanEntry = JSON.parse(JSON.stringify(entry, (k, v) => v === undefined ? null : v));
      await window.__FB.saveQuote(fbUser.uid, cleanEntry);
      resetCalc();
      showToast("Cotización guardada ☁️");
    } catch(e) { showToast("Error al guardar: " + e.message); }
  };

  const loadQuote = (q) => {
    setClientName(q.client || ""); setScheduler(normName(q.scheduler || "")); setAttendant(normName(q.attendant || "")); setConcretada(!!q.concretada);
    setLines(q.lines.map(l => ({
      id: uid(), category: l.category,
      grams:      (l.category === INSUMO_KEY || l.category === LOTE_KEY) ? '' : String(l.grams),
      insumoName: l.insumoName  || '',
      insumoCost: l.insumoCost  ? String(l.insumoCost)  : (l.insumoPrice ? String(l.insumoPrice) : ''),
      insumoValor: l.insumoValor ? String(l.insumoValor) : '',
      insumoQty:  '1',
      loteName:   l.loteName    || '',
      loteGramsMap: l.loteGramsMap || {},
      lotePrice:  l.lotePrice   ? String(l.lotePrice)   : '',
      customPrice: l.customPrice ? String(l.customPrice) : ''
    })));
    setTab('calc');
    showToast("Cotización cargada");
  };

  const toggleConcretada = async (id) => {
    const quote = history.find(q => q.id === id);
    if (!quote) return;
    if (!quote.concretada) {
      if (!confirm(`¿Confirmar venta${quote.client ? ' de ' + quote.client : ''} por $${fmtCLP(quote.total)}?\n\nSe agregará a los reportes de ventas.`)) return;
      await window.__FB.updateQuote(id, { concretada: true });
      showToast("✅ Venta confirmada · Agregada a reportes");
    } else {
      if (!confirm('¿Quitar la confirmación de esta venta?\n\nSe eliminará de los reportes.')) return;
      await window.__FB.updateQuote(id, { concretada: false });
      showToast("Venta removida de reportes");
    }
  };

  const deleteQuote = async (id) => {
    await window.__FB.deleteQuote(id);
  };

  const shareQuote = async (q) => {
    const p = prices;
    const linesText = q.lines.map(l => {
      if (l.category === INSUMO_KEY) {
        const qty = Number(l.insumoQty) || 1;
        return `• ${qty} ${l.insumoName || 'Insumo'} 💎 — $${fmtCLP(l.insumoPrice || 0)}`;
      }
      if (l.category === LOTE_KEY) {
        const nombre = l.loteName ? l.loteName : 'Lote';
        return `• ${nombre} — $${fmtCLP(Number(l.lotePrice) || 0)}`;
      }
      const cat   = p[l.category];
      const price = Number(l.customPrice) || 0;
      return `• ${cat ? cat.name : l.category} — ${l.grams}g × $${fmtCLP(price)} = $${fmtCLP(price * l.grams)}`;
    }).join('\n');
    const text =
`✨ Detalles De Venta${q.client ? ' · Venta de ' + q.client : ''}
${fmtDate(q.at)}

${linesText}

Peso total: ${fmtCLP(q.totalWeight)}g
Total: $${fmtCLP(q.total)} CLP`;
    if (navigator.share) { try { await navigator.share({ text }); return; } catch(_){} }
    try { await navigator.clipboard.writeText(text); showToast("¡Mensaje copiado al portapapeles!"); }
    catch(_) { showToast("No se pudo compartir"); }
  };

  // ── Pantalla de carga inicial ──
  if (fbUser === undefined) {
    return (
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12}}>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{width:36,height:36,borderRadius:'50%',border:'3px solid var(--line)',borderTopColor:'var(--gold)',animation:'spin 1s linear infinite'}}/>
        <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ink-mute)',letterSpacing:'.2em'}}>CONECTANDO…</div>
      </div>
    );
  }

  if (!fbUser) return <LoginScreen onAuth={(user) => setFbUser(user)} />;

  return (
    <div className="app">
      <header className="brand">
        <div className="mark" aria-hidden>◆</div>
        <div style={{flex:1}}>
          <h1>Joyería <em>Aravena</em></h1>
          <div className="sub">{userProfile?.name || fbUser.email}{isAdmin ? ' · Admin' : ''}</div>
        </div>
        {isAdmin && (
          <button className="icon-btn" onClick={()=>setAdminOpen(true)} aria-label="Panel admin" title="Panel admin" style={{marginRight:6}}>
            <span style={{fontSize:14,lineHeight:1}}>👥</span>
          </button>
        )}
        <button className="icon-btn" onClick={()=>setThemeOpen(true)} aria-label="Cambiar tema" title="Cambiar tema" style={{marginRight:6}}>
          <span style={{fontSize:14,lineHeight:1}}>◐</span>
        </button>
        <button className="icon-btn" onClick={logout} aria-label="Cerrar sesión" title="Cerrar sesión">
          <Icon name="x" size={14}/>
        </button>
      </header>

      {themeOpen && (
        <ThemePicker theme={theme} setTheme={setTheme}
          customTheme={customTheme} setCustomTheme={setCustomTheme}
          onClose={()=>setThemeOpen(false)} />
      )}
      {adminOpen && isAdmin && (
        <AdminPanel currentUser={fbUser} onClose={()=>setAdminOpen(false)} />
      )}

      <nav className="tabs" role="tablist">
        <button className="tab" role="tab" aria-selected={tab==='calc'}    onClick={()=>setTab('calc')}>
          <Icon name="calc" size={14}/> Venta
        </button>
        <button className="tab" role="tab" aria-selected={tab==='hist'}    onClick={()=>setTab('hist')}>
          <Icon name="clock" size={14}/> Historial
        </button>
        <button className="tab" role="tab" aria-selected={tab==='reports'} onClick={()=>setTab('reports')}>
          <Icon name="share" size={14}/> Reportes
        </button>
        <button className="tab" role="tab" aria-selected={tab==='charts'}  onClick={()=>setTab('charts')}>
          <span style={{fontSize:13}}>📊</span> Gráficos
        </button>
      </nav>

      {tab === 'calc' && (
        <CalcTab
          clientName={clientName} setClientName={setClientName}
          pago={pago} setPago={setPago}
          scheduler={scheduler} setScheduler={setScheduler}
          attendant={attendant} setAttendant={setAttendant}
          concretada={concretada} setConcretada={setConcretada}
          lines={lines} prices={prices}
          addLine={addLine} removeLine={removeLine} updateLine={updateLine}
          totals={totals} resetCalc={resetCalc} saveQuote={saveQuote}
          copyMessage={copyMessage} canCopy={hasValidLines}
          customTotal={customTotal} setCustomTotal={setCustomTotal}
        />
      )}
      {tab === 'hist' && (
        <HistoryTab history={history} prices={prices}
          onDelete={deleteQuote} onDuplicate={loadQuote} onShare={shareQuote}
          onToggleConcretada={toggleConcretada} />
      )}
      {tab === 'reports' && (
        <ReportsTab history={history} prices={prices} onToggleConcretada={toggleConcretada} />
      )}
      {tab === 'charts' && (
        <ChartsTab history={history} prices={prices} />
      )}

      <div className={"toast" + (toast ? " show" : "")}>{toast}</div>

      {tab === 'calc' && (
        <button className="fab" onClick={() => copyMessage()} disabled={!hasValidLines}>
          <span className="ico">📋</span> Copiar mensaje
        </button>
      )}

      {editMode && <TweaksPanel prices={prices} setPrices={setPrices} onClose={()=>setEditMode(false)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  let _swReloaded = false;
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'SW_UPDATED' && !_swReloaded) {
      _swReloaded = true;
      window.location.reload();
    }
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.update();
      setInterval(() => reg.update().catch(() => {}), 60000);
    }).catch(() => {});
  });
}
</script>
</body>
</html>
